<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>星河渡口 · 梦幻星云 | 文字粒子风暴</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            background-color: #010118;
        }
        .scene-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            will-change: opacity;
        }
        .scene-hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }
        .console-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(16px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 30;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0s linear 0.5s;
            font-family: 'Courier New', monospace;
        }
        .console-panel.active {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.5s ease, visibility 0s linear 0s;
        }
        .terminal {
            width: 88%;
            max-width: 700px;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 32px;
            padding: 28px 24px;
            border: 1px solid;
            box-shadow: 0 0 50px rgba(0, 255, 200, 0.4);
            animation: fadeInUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .line {
            margin-bottom: 18px;
            line-height: 1.4;
            text-shadow: 0 0 5px currentColor;
            font-size: clamp(12px, 4vw, 18px);
        }
        .prompt {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 22px 0;
        }
        .prompt span {
            font-size: clamp(18px, 5vw, 26px);
            font-weight: bold;
        }
        .prompt input {
            background: transparent;
            border: none;
            font-family: inherit;
            font-size: clamp(14px, 4vw, 18px);
            flex: 1;
            outline: none;
            border-bottom: 1px solid;
            padding: 10px 0;
            color: inherit;
        }
        .output {
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px dashed;
            min-height: 130px;
            max-height: 280px;
            overflow-y: auto;
            font-size: clamp(11px, 3.5vw, 15px);
        }
        .output p {
            margin: 10px 0;
            word-break: break-word;
        }
        .back-btn {
            margin-top: 24px;
            background: rgba(255,255,255,0.15);
            border: 1px solid;
            padding: 10px 24px;
            border-radius: 60px;
            cursor: pointer;
            font-family: monospace;
            font-size: clamp(12px, 4vw, 16px);
            transition: 0.2s;
            display: inline-block;
            text-align: center;
        }
        .back-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.3); }
        .instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.55);
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            font-size: 12px;
            pointer-events: none;
            z-index: 20;
            backdrop-filter: blur(4px);
            font-family: monospace;
        }
        @media (max-width: 600px) {
            .terminal { padding: 20px 16px; }
            .instruction { font-size: 9px; bottom: 12px; left: 12px; }
        }
        #transitionCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div class="instruction" id="globalHint">✨ 星河渡口 · 点击任意处开启星门 ✨</div>

    <div id="sceneNebula" class="scene-container">
        <div style="position: absolute; bottom: 20px; right: 20px; color: rgba(255,255,255,0.5); background: rgba(0,0,0,0.3); padding: 4px 12px; border-radius: 20px; font-size: 10px; pointer-events: none; z-index: 10;">
            🖱️ 手指滑动 → 扭曲星云 | 点击 → 穿越星门
        </div>
    </div>

    <div id="sceneWords" class="scene-container scene-hidden">
        <div style="position: absolute; bottom: 20px; right: 20px; color: rgba(255,255,255,0.5); background: rgba(0,0,0,0.3); padding: 4px 12px; border-radius: 20px; font-size: 10px; pointer-events: none; z-index: 10;">
            ✨ 点击发光文字 → 开启智慧回廊
        </div>
    </div>

    <div id="consolePanel" class="console-panel">
        <div class="terminal" id="terminalRoot"></div>
    </div>

    <canvas id="transitionCanvas"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
        let activeScene = 'nebula';   // 'nebula' or 'words'
        
        const nebulaDiv = document.getElementById('sceneNebula');
        const wordsDiv = document.getElementById('sceneWords');
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 2, 14);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'auto';
        document.body.appendChild(labelRenderer.domElement);
        
        // ---------- 1. 梦幻星云场景 ----------
        const nebulaScene = new THREE.Scene();
        nebulaScene.background = new THREE.Color(0x010118);
        nebulaScene.fog = new THREE.FogExp2(0x010118, 0.0006);
        
        const N_COUNT = isMobile ? 3800 : 6500;
        const posOrig = new Float32Array(N_COUNT * 3);
        const colorHues = new Float32Array(N_COUNT);
        const nebulaGeo = new THREE.BufferGeometry();
        const rMin = 2.8, rMax = 6.5;
        for (let i = 0; i < N_COUNT; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = rMin + Math.random() ** 1.5 * (rMax - rMin);
            let x = r * Math.sin(phi) * Math.cos(theta);
            let y = r * Math.sin(phi) * Math.sin(theta) * 0.6;
            let z = r * Math.cos(phi) * 1.2;
            const angle = Math.atan2(z, x);
            const arm = Math.sin(angle * 3) * 0.8;
            x += arm * 0.5;
            z += arm * 0.3;
            y += Math.sin(angle * 2) * 0.4;
            posOrig[i*3] = x;
            posOrig[i*3+1] = y;
            posOrig[i*3+2] = z;
            const hue = 0.6 + ((r - rMin)/(rMax - rMin)) * 0.3 + ((angle + Math.PI)/(2*Math.PI)) * 0.2;
            colorHues[i] = hue % 1.0;
        }
        nebulaGeo.setAttribute('position', new THREE.BufferAttribute(posOrig.slice(), 3));
        const initColors = new Float32Array(N_COUNT * 3);
        for (let i = 0; i < N_COUNT; i++) {
            const c = new THREE.Color().setHSL(colorHues[i], 1.0, 0.55);
            initColors[i*3] = c.r;
            initColors[i*3+1] = c.g;
            initColors[i*3+2] = c.b;
        }
        nebulaGeo.setAttribute('color', new THREE.BufferAttribute(initColors, 3));
        
        const createParticleTex = () => {
            const canv = document.createElement('canvas');
            canv.width = 32; canv.height = 32;
            const ctx = canv.getContext('2d');
            ctx.arc(16, 16, 14, 0, 2*Math.PI);
            ctx.fillStyle = 'white';
            ctx.fill();
            const grad = ctx.createRadialGradient(16,16,0,16,16,14);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(0.4, 'rgba(255,180,100,0.9)');
            grad.addColorStop(0.7, 'rgba(255,80,120,0.6)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,32,32);
            return new THREE.CanvasTexture(canv);
        };
        const nebulaMat = new THREE.PointsMaterial({
            size: isMobile ? 0.18 : 0.22,
            map: createParticleTex(),
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            depthWrite: false
        });
        const nebulaPoints = new THREE.Points(nebulaGeo, nebulaMat);
        nebulaScene.add(nebulaPoints);
        
        const starGeo = new THREE.BufferGeometry();
        const starCnt = isMobile ? 900 : 1800;
        const starPos = [];
        for (let i=0;i<starCnt;i++) {
            starPos.push((Math.random() - 0.5)*200);
            starPos.push((Math.random() - 0.5)*100);
            starPos.push((Math.random() - 0.5)*80 - 40);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const starMat = new THREE.PointsMaterial({ color: 0xaaccff, size: isMobile ? 0.07 : 0.1, transparent: true, blending: THREE.AdditiveBlending });
        const bgStars = new THREE.Points(starGeo, starMat);
        nebulaScene.add(bgStars);
        
        nebulaScene.add(new THREE.AmbientLight(0x111122));
        const pointLight = new THREE.PointLight(0x4466ff, 0.5);
        pointLight.position.set(2,3,4);
        nebulaScene.add(pointLight);
        
        const renderSceneNebula = new RenderPass(nebulaScene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = isMobile ? 0.9 : 1.1;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderSceneNebula);
        effectComposer.addPass(bloomPass);
        
        let pointerX = 0.5, pointerY = 0.5;
        let smoothX = 0.5, smoothY = 0.5;
        let nTime = 0;
        const posAttr = nebulaGeo.attributes.position;
        const posArr = posAttr.array;
        
        function handlePointer(clientX, clientY) {
            pointerX = Math.min(1, Math.max(0, clientX / window.innerWidth));
            pointerY = Math.min(1, Math.max(0, clientY / window.innerHeight));
        }
        window.addEventListener('mousemove', (e) => handlePointer(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => { e.preventDefault(); if(e.touches.length) handlePointer(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener('touchstart', (e) => { if(e.touches.length) handlePointer(e.touches[0].clientX, e.touches[0].clientY); });
        
        function updateNebulaColors() {
            const hueShift = (smoothY - 0.5) * 1.2;
            const cols = nebulaGeo.attributes.color.array;
            for (let i=0;i<N_COUNT;i++) {
                let nh = colorHues[i] + hueShift;
                if (nh<0) nh+=1; if (nh>1) nh-=1;
                const col = new THREE.Color().setHSL(nh, 1.0, 0.55);
                cols[i*3]=col.r; cols[i*3+1]=col.g; cols[i*3+2]=col.b;
            }
            nebulaGeo.attributes.color.needsUpdate = true;
        }
        function updateNebulaPositions() {
            const strength = 0.5 + smoothX * 1.8;
            const rotY = nTime * 0.15 + (smoothX - 0.5) * 1.5;
            const rotX = (smoothY - 0.5) * 0.6;
            const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
            const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
            for (let i=0;i<N_COUNT;i++) {
                const ix = i*3;
                const ox = posOrig[ix], oy = posOrig[ix+1], oz = posOrig[ix+2];
                let x1 = ox*cosY - oz*sinY;
                let z1 = ox*sinY + oz*cosY;
                let y1 = oy;
                let y2 = y1*cosX - z1*sinX;
                let z2 = y1*sinX + z1*cosX;
                let x2 = x1;
                const rad = Math.hypot(x2,y2,z2);
                const nx = x2/(rad+0.001), ny = y2/(rad+0.001), nz = z2/(rad+0.001);
                const aYZ = Math.atan2(y2, z2), aXZ = Math.atan2(x2, z2);
                const w1 = Math.sin(aXZ*4 + nTime*2)*0.2;
                const w2 = Math.cos(aYZ*3 - nTime*1.5)*0.15;
                const ds = strength*0.4;
                const offX = ny*w1*ds + nz*w2*0.2;
                const offY = nz*w2*ds + nx*w1*0.2;
                const offZ = nx*w1*ds + ny*w2*0.2;
                posArr[ix] = x2+offX;
                posArr[ix+1] = y2+offY;
                posArr[ix+2] = z2+offZ;
            }
            posAttr.needsUpdate = true;
        }
        
        // ---------- 2. 文字粒子风暴场景 ----------
        const wordsScene = new THREE.Scene();
        wordsScene.background = new THREE.Color(0x050b1a);
        wordsScene.fog = new THREE.FogExp2(0x050b1a, 0.008);
        wordsScene.add(new THREE.AmbientLight(0x222222));
        const wLight = new THREE.PointLight(0x4466ff, 0.6);
        wLight.position.set(2,3,5);
        wordsScene.add(wLight);
        
        const wStarGeo = new THREE.BufferGeometry();
        const wStarCnt = isMobile ? 700 : 1200;
        const wStarPos = [];
        for (let i=0;i<wStarCnt;i++) {
            wStarPos.push((Math.random()-0.5)*200);
            wStarPos.push((Math.random()-0.5)*100);
            wStarPos.push((Math.random()-0.5)*80-40);
        }
        wStarGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(wStarPos),3));
        const wStarMat = new THREE.PointsMaterial({ color:0xffffff, size:isMobile?0.08:0.12, blending:THREE.AdditiveBlending });
        const wStars = new THREE.Points(wStarGeo, wStarMat);
        wordsScene.add(wStars);
        
        const ringCount = isMobile ? 400 : 800;
        const ringGeo = new THREE.BufferGeometry();
        const ringPos = [];
        for (let i=0;i<ringCount;i++) {
            const ang = (i/ringCount)*Math.PI*2;
            const rad = 2.2;
            ringPos.push(Math.cos(ang)*rad, Math.sin(ang)*rad*0.5, Math.sin(ang)*rad*0.8);
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(ringPos),3));
        const ringMat = new THREE.PointsMaterial({ color:0x77aaff, size:isMobile?0.04:0.05, blending:THREE.AdditiveBlending });
        const ringPoints = new THREE.Points(ringGeo, ringMat);
        wordsScene.add(ringPoints);
        
        const floatCount = isMobile ? 1200 : 2500;
        const floatGeo = new THREE.BufferGeometry();
        const floatPos = [];
        for (let i=0;i<floatCount;i++) {
            const r = 3 + Math.random()*4;
            const th = Math.random()*Math.PI*2;
            const ph = Math.acos(2*Math.random()-1);
            floatPos.push(r*Math.sin(ph)*Math.cos(th));
            floatPos.push(r*Math.sin(ph)*Math.sin(th)*0.8);
            floatPos.push(r*Math.cos(ph));
        }
        floatGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(floatPos),3));
        const floatMat = new THREE.PointsMaterial({ color:0x88aaff, size:isMobile?0.05:0.07, blending:THREE.AdditiveBlending });
        const floatPoints = new THREE.Points(floatGeo, floatMat);
        wordsScene.add(floatPoints);
        
        const topics = [
            { name:'SCI-FI', color:'#0ff', bg:'rgba(0,255,255,0.2)', px:-3.2, py:0.8, pz:0 },
            { name:'PHILOSOPHY', color:'#f9f', bg:'rgba(255,0,255,0.2)', px:0, py:-0.5, pz:0 },
            { name:'FUNNY', color:'#fa4', bg:'rgba(255,170,68,0.2)', px:3.2, py:0.8, pz:0 }
        ];
        const wordLabels = [];
        topics.forEach(t => {
            const div = document.createElement('div');
            div.textContent = t.name;
            div.style.cssText = `
                color: ${t.color}; font-size: ${isMobile?'32px':'48px'}; font-weight: bold;
                font-family: 'Segoe UI', Poppins, monospace; text-shadow: 0 0 15px ${t.color};
                background: ${t.bg}; padding: ${isMobile?'8px 20px':'12px 28px'}; border-radius: 60px;
                border: 1px solid ${t.color}; backdrop-filter: blur(8px); cursor: pointer;
                transition: 0.2s; letter-spacing: 2px; text-align: center;
            `;
            div.addEventListener('click', (e) => { e.stopPropagation(); openConsole(t.name.toLowerCase()); });
            const label = new CSS2DObject(div);
            label.position.set(t.px, t.py, t.pz);
            wordsScene.add(label);
            wordLabels.push(label);
        });
        
        let wTime = 0;
        
        const themes = {
            'sci-fi': { name:'⚡ 科幻终端', color:'#0cf', symbol:'>_',
                answers:["🛸 星际联邦档案：未来三日有超光速信号。","🤖 AI核心：你的选择将影响平行宇宙熵值。","🌌 深空回声：勇气是宇宙最稀缺资源。","🧬 基因解锁：创造力等级Omega-7。","⚙️ 机械低语：你将完成令人惊叹的项目。"],
                keywordMap:{"未来":"🔮 12个月内重大转折。","科技":"💻 尝试学习一门新语言。","宇宙":"🌠 你与星辰同源。"}
            },
            'philosophy': { name:'🧘 哲学沉思录', color:'#f6f', symbol:'❓',
                answers:["🌿 庄子曰：问题本身就是答案。","📜 尼采：无法杀死你的使你更强大。","💎 柏拉图：你正走向光。","🌀 老子：道可道，非常道。","✨ 加缪：在荒诞中寻找热爱。"],
                keywordMap:{"意义":"生命意义由你定义。","幸福":"幸福是旅途中的知足。","死亡":"死亡教会珍惜此刻。"}
            },
            'funny': { name:'😂 搞笑工坊', color:'#fa4', symbol:':)',
                answers:["🐣 程序员：Oct31=Dec25！","🍕 幸运食物：披萨加双倍芝士。","🤣 宇宙笑话：你是限量版。","🎈 老板说再改最后一版是骗人的。","🧸 幽默指数爆表，快分享快乐。"],
                keywordMap:{"工作":"🍉 工作像西瓜，有的甜有的水。","钱":"💰 钱不是万能的，但段子需要底气。","爱情":"💕 爱情像鬼，听过的人多。"}
            }
        };
        
        const consolePanel = document.getElementById('consolePanel');
        const terminalRoot = document.getElementById('terminalRoot');
        function renderConsole(themeKey) {
            const th = themes[themeKey];
            if(!th) return;
            terminalRoot.innerHTML = `
                <div class="line" style="color:${th.color};">> ${th.name}</div>
                <div class="line" style="color:${th.color};">> 输入任何问题，按回车 → 获得专属回应</div>
                <div class="prompt"><span style="color:${th.color};">${th.symbol}</span>
                <input type="text" id="consoleInput" placeholder="例如：你好" autofocus style="color:${th.color}; border-bottom-color:${th.color};"></div>
                <div class="output" id="consoleOutput" style="border-top-color:${th.color};"><p style="color:${th.color};">✨ 等待你的第一句话...</p></div>
                <div class="back-btn" style="border-color:${th.color}; color:${th.color};" id="backToNebulaBtn">↺ 返回星云世界</div>
            `;
            const input = document.getElementById('consoleInput');
            const outDiv = document.getElementById('consoleOutput');
            function addMsg(q,a) {
                const qp = document.createElement('p'); qp.style.color='#aaa'; qp.innerHTML=`❯ 你问：${q}`;
                const ap = document.createElement('p'); ap.style.color=th.color; ap.innerHTML=`◉ ${a}`;
                outDiv.appendChild(qp); outDiv.appendChild(ap); outDiv.scrollTop = outDiv.scrollHeight;
                while(outDiv.children.length>16) outDiv.removeChild(outDiv.firstChild);
            }
            function getAns(q) {
                const lq = q.toLowerCase();
                for(let [k,v] of Object.entries(th.keywordMap)) if(lq.includes(k)) return v;
                return th.answers[Math.floor(Math.random()*th.answers.length)];
            }
            function submit() {
                const q = input.value.trim();
                if(!q) return;
                addMsg(q, getAns(q));
                input.value = "";
                input.focus();
            }
            input.addEventListener('keypress', (e) => { if(e.key==='Enter') submit(); });
            document.getElementById('backToNebulaBtn').addEventListener('click', () => {
                consolePanel.classList.remove('active');
                startTransition('toNebula');
            });
            setTimeout(()=>input.focus(),300);
        }
        function openConsole(themeKey) {
            renderConsole(themeKey);
            consolePanel.classList.add('active');
        }
        
        // ---------- 转场特效 ----------
        const transCanvas = document.getElementById('transitionCanvas');
        const ctx = transCanvas.getContext('2d');
        let transActive = false;
        let transProgress = 0;
        let transTarget = '';
        let transParticles = [];
        
        function resizeTransCanvas() {
            transCanvas.width = window.innerWidth;
            transCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeTransCanvas);
        resizeTransCanvas();
        
        function startTransition(target) {
            if(transActive) return;
            transActive = true;
            transProgress = 0;
            transTarget = target;
            transParticles = [];
            const pCount = 400;
            for(let i=0;i<pCount;i++) {
                transParticles.push({
                    x: Math.random() * transCanvas.width,
                    y: Math.random() * transCanvas.height,
                    radius: 2 + Math.random() * 6,
                    alpha: 0.7 + Math.random()*0.3,
                    color: `hsl(${200 + Math.random()*100}, 80%, 60%)`
                });
            }
            if(target === 'toWords') {
                nebulaDiv.style.opacity = '0';
                setTimeout(() => nebulaDiv.classList.add('scene-hidden'), 1200);
            } else {
                wordsDiv.style.opacity = '0';
                setTimeout(() => wordsDiv.classList.add('scene-hidden'), 1200);
            }
            animateTransition();
        }
        
        function animateTransition() {
            if(!transActive) return;
            transProgress += 0.025;
            if(transProgress >= 1) {
                transActive = false;
                transCanvas.style.opacity = '0';
                if(transTarget === 'toWords') {
                    activeScene = 'words';
                    wordsDiv.classList.remove('scene-hidden');
                    wordsDiv.style.opacity = '1';
                    nebulaDiv.classList.add('scene-hidden');
                    document.getElementById('globalHint').innerText = '✨ 文字粒子风暴 · 点击发光文字进入智慧回廊 ✨';
                } else {
                    activeScene = 'nebula';
                    nebulaDiv.classList.remove('scene-hidden');
                    nebulaDiv.style.opacity = '1';
                    wordsDiv.classList.add('scene-hidden');
                    document.getElementById('globalHint').innerText = '✨ 星河渡口 · 点击任意处开启星门 ✨';
                }
                transCanvas.style.opacity = '0';
                return;
            }
            transCanvas.style.opacity = '1';
            ctx.clearRect(0,0,transCanvas.width,transCanvas.height);
            const centerX = transCanvas.width/2, centerY = transCanvas.height/2;
            for(let p of transParticles) {
                if(transTarget === 'toWords') {
                    const factor = 1 - transProgress;
                    const tx = centerX + (p.x - centerX) * factor;
                    const ty = centerY + (p.y - centerY) * factor;
                    const rad = p.radius * factor;
                    ctx.beginPath();
                    ctx.arc(tx, ty, rad, 0, Math.PI*2);
                    ctx.fillStyle = p.color;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#ff99cc';
                    ctx.fill();
                } else {
                    const angle = Math.atan2(p.y - centerY, p.x - centerX);
                    const dist = transProgress * Math.min(transCanvas.width, transCanvas.height) * 1.2;
                    const outX = centerX + Math.cos(angle) * dist;
                    const outY = centerY + Math.sin(angle) * dist;
                    const rad = p.radius * (0.5 + transProgress*1.5);
                    ctx.beginPath();
                    ctx.arc(outX, outY, rad, 0, Math.PI*2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = 1 - transProgress;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
            ctx.shadowBlur = 0;
            requestAnimationFrame(animateTransition);
        }
        
        // ***** 关键修复：全局点击触发星门穿越 *****
        window.addEventListener('click', (e) => {
            // 只有在星云场景、未转场、且点击的目标不是控制台内部按钮或文字标签时，才触发穿越
            if (activeScene === 'nebula' && !transActive) {
                // 避免点击控制台返回按钮时误触发（但控制台此时未激活，没问题）
                startTransition('toWords');
            }
        });
        
        // 触摸端同样（防止移动端click延迟，但click也兼容）
        window.addEventListener('touchstart', (e) => {
            if (activeScene === 'nebula' && !transActive) {
                // 轻微延迟避免和滚动冲突，但直接触发也可
                startTransition('toWords');
            }
        });
        
        // ---------- 动画主循环 ----------
        let lastTime = 0;
        function mainLoop() {
            const now = performance.now();
            let delta = Math.min(1/30, (now - lastTime)/1000);
            lastTime = now;
            
            if(activeScene === 'nebula') {
                smoothX += (pointerX - smoothX) * 0.08;
                smoothY += (pointerY - smoothY) * 0.08;
                nTime += delta * 1.2;
                updateNebulaPositions();
                updateNebulaColors();
                camera.position.x += ( (smoothX - 0.5)*0.6 - camera.position.x ) * 0.05;
                camera.position.y += ( (smoothY - 0.5)*0.4 - camera.position.y ) * 0.05;
                camera.lookAt(0,0,0);
                effectComposer.render();
            } else if(activeScene === 'words') {
                wTime += 0.008;
                ringPoints.rotation.y = wTime * 0.5;
                ringPoints.rotation.x = Math.sin(wTime*0.3)*0.2;
                floatPoints.rotation.y = wTime * 0.1;
                wStars.rotation.y += 0.0005;
                wordLabels.forEach((l,idx) => { l.position.y += Math.sin(wTime*1.5+idx)*0.002; });
                camera.position.x += (0 - camera.position.x)*0.02;
                camera.position.y += (0 - camera.position.y)*0.02;
                camera.lookAt(0,0,0);
                renderer.render(wordsScene, camera);
                labelRenderer.render(wordsScene, camera);
            }
            requestAnimationFrame(mainLoop);
        }
        
        mainLoop();
        
        // 初始状态
        nebulaDiv.style.opacity = '1';
        wordsDiv.style.opacity = '0';
        wordsDiv.classList.add('scene-hidden');
        
        console.log('%c✨ 星河渡口 · 修复版 ✨ 点击星云任意处即可穿越星门', 'color: #0cf; font-size: 14px;');
    </script>
</body>
</html>
