<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>梦幻粒子星云 · 鼠标/触摸扭曲流光</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
            touch-action: none; /* 防止触摸时滚动/缩放 */
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.8);
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
            letter-spacing: 1px;
            font-weight: 300;
            border-left: 3px solid #ff66cc;
        }
        #instruction {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 10px;
            pointer-events: none;
            font-family: monospace;
        }
        @media (max-width: 600px) {
            #info { font-size: 10px; bottom: 12px; left: 12px; }
            #instruction { font-size: 8px; bottom: 12px; right: 12px; }
        }
    </style>
</head>
<body>
    <div id="info">
        ✨ 梦幻粒子星云 | 手指滑动 → 扭曲星云 & 流光变色
    </div>
    <div id="instruction">
        🖐️ 左右滑动 → 改变漩涡 | 上下滑动 → 改变色调
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- 移动端性能优化：根据屏幕宽度动态调整粒子数量 ---
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const PARTICLE_COUNT = isMobile ? 3800 : 6500;  // 移动端减少粒子，保持流畅
        
        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118);
        scene.fog = new THREE.FogExp2(0x010118, 0.0006);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 5, 18);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: false }); // 移动端关闭抗锯齿提升性能
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 限制像素比
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // 后期特效：发光 Bloom
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = isMobile ? 0.9 : 1.1;  // 移动端降低光晕强度
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // ---------- 粒子系统 ----------
        const positionsOriginal = new Float32Array(PARTICLE_COUNT * 3);
        const colorHues = new Float32Array(PARTICLE_COUNT);
        
        const geometry = new THREE.BufferGeometry();
        const radiusMin = 2.8;
        const radiusMax = 6.5;
        
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = radiusMin + Math.random() ** 1.5 * (radiusMax - radiusMin);
            
            let x = r * Math.sin(phi) * Math.cos(theta);
            let y = r * Math.sin(phi) * Math.sin(theta) * 0.6;
            let z = r * Math.cos(phi) * 1.2;
            
            const angle = Math.atan2(z, x);
            const armOffset = Math.sin(angle * 3) * 0.8;
            x += armOffset * 0.5;
            z += armOffset * 0.3;
            y += Math.sin(angle * 2) * 0.4;
            
            positionsOriginal[i*3] = x;
            positionsOriginal[i*3+1] = y;
            positionsOriginal[i*3+2] = z;
            
            const hueFactor = (r - radiusMin) / (radiusMax - radiusMin);
            const angleHue = (angle + Math.PI) / (2 * Math.PI);
            let hue = 0.6 + hueFactor * 0.3 + angleHue * 0.2;
            hue = hue % 1.0;
            colorHues[i] = hue;
        }
        
        geometry.setAttribute('position', new THREE.BufferAttribute(positionsOriginal.slice(), 3));
        
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const hue = colorHues[i];
            const color = new THREE.Color().setHSL(hue, 1.0, 0.55);
            colors[i*3] = color.r;
            colors[i*3+1] = color.g;
            colors[i*3+2] = color.b;
        }
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const createParticleTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(16, 16, 14, 0, 2 * Math.PI);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 14);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.4, 'rgba(255,180,100,0.9)');
            gradient.addColorStop(0.7, 'rgba(255,80,120,0.6)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        };
        
        const particleMaterial = new THREE.PointsMaterial({
            size: isMobile ? 0.18 : 0.22,
            map: createParticleTexture(),
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.95,
            depthWrite: false
        });
        
        const particleSystem = new THREE.Points(geometry, particleMaterial);
        scene.add(particleSystem);
        
        // 背景星星（移动端减少数量）
        const bgStarGeometry = new THREE.BufferGeometry();
        const bgStarCount = isMobile ? 800 : 1800;
        const bgPositions = new Float32Array(bgStarCount * 3);
        for (let i = 0; i < bgStarCount; i++) {
            const rad = 45 + Math.random() * 35;
            const thetaBg = Math.random() * Math.PI * 2;
            const phiBg = Math.acos(2 * Math.random() - 1);
            bgPositions[i*3] = rad * Math.sin(phiBg) * Math.cos(thetaBg);
            bgPositions[i*3+1] = rad * Math.sin(phiBg) * Math.sin(thetaBg) * 0.5;
            bgPositions[i*3+2] = rad * Math.cos(phiBg);
        }
        bgStarGeometry.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
        const bgStarMaterial = new THREE.PointsMaterial({
            color: 0xaaccff,
            size: isMobile ? 0.06 : 0.08,
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending
        });
        const bgStars = new THREE.Points(bgStarGeometry, bgStarMaterial);
        scene.add(bgStars);
        
        function animateStars() {
            bgStars.rotation.y += 0.0005;
            bgStars.rotation.x += 0.0003;
            requestAnimationFrame(animateStars);
        }
        animateStars();
        
        // --- 触摸/鼠标交互数据 ---
        let pointerX = 0.5;   // 归一化坐标 (0-1)
        let pointerY = 0.5;
        
        // 统一处理鼠标和触摸事件
        function handlePointerMove(clientX, clientY) {
            pointerX = clientX / window.innerWidth;
            pointerY = clientY / window.innerHeight;
            // 边界裁剪
            pointerX = Math.min(1, Math.max(0, pointerX));
            pointerY = Math.min(1, Math.max(0, pointerY));
        }
        
        window.addEventListener('mousemove', (e) => {
            handlePointerMove(e.clientX, e.clientY);
        });
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();  // 防止页面滚动
            if (e.touches.length) {
                handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length) {
                handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        
        let smoothX = 0.5;
        let smoothY = 0.5;
        let time = 0;
        
        const positionAttribute = geometry.attributes.position;
        const posArray = positionAttribute.array;
        
        function updateColorsByMouse() {
            const hueShift = (smoothY - 0.5) * 1.2;
            const colorsArray = geometry.attributes.color.array;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let newHue = colorHues[i] + hueShift;
                if (newHue < 0) newHue += 1;
                if (newHue > 1) newHue -= 1;
                const col = new THREE.Color().setHSL(newHue, 1.0, 0.55);
                colorsArray[i*3] = col.r;
                colorsArray[i*3+1] = col.g;
                colorsArray[i*3+2] = col.b;
            }
            geometry.attributes.color.needsUpdate = true;
        }
        
        function updatePositionsWithDistortion() {
            const strength = 0.5 + smoothX * 1.8;
            const baseRotY = time * 0.15;
            const extraRotY = (smoothX - 0.5) * 1.5;
            const totalRotY = baseRotY + extraRotY;
            const rotX = (smoothY - 0.5) * 0.6;
            
            const cosRY = Math.cos(totalRotY);
            const sinRY = Math.sin(totalRotY);
            const cosRX = Math.cos(rotX);
            const sinRX = Math.sin(rotX);
            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const ix = i * 3;
                const origX = positionsOriginal[ix];
                const origY = positionsOriginal[ix+1];
                const origZ = positionsOriginal[ix+2];
                
                let x1 = origX * cosRY - origZ * sinRY;
                let z1 = origX * sinRY + origZ * cosRY;
                let y1 = origY;
                
                let y2 = y1 * cosRX - z1 * sinRX;
                let z2 = y1 * sinRX + z1 * cosRX;
                let x2 = x1;
                
                const radius = Math.sqrt(x2*x2 + y2*y2 + z2*z2);
                const normX = x2 / (radius + 0.001);
                const normY = y2 / (radius + 0.001);
                const normZ = z2 / (radius + 0.001);
                
                const angleYZ = Math.atan2(y2, z2);
                const angleXZ = Math.atan2(x2, z2);
                const wave1 = Math.sin(angleXZ * 4.0 + time * 2.0) * 0.2;
                const wave2 = Math.cos(angleYZ * 3.0 - time * 1.5) * 0.15;
                const distortStrength = strength * 0.4;
                
                const offsetX = normY * wave1 * distortStrength + normZ * wave2 * 0.2;
                const offsetY = normZ * wave2 * distortStrength + normX * wave1 * 0.2;
                const offsetZ = normX * wave1 * distortStrength + normY * wave2 * 0.2;
                
                posArray[ix] = x2 + offsetX;
                posArray[ix+1] = y2 + offsetY;
                posArray[ix+2] = z2 + offsetZ;
            }
            positionAttribute.needsUpdate = true;
        }
        
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        const backLight = new THREE.PointLight(0x4466ff, 0.5);
        backLight.position.set(2, 3, 4);
        scene.add(backLight);
        
        let lastTimestamp = 0;
        function animate() {
            const now = performance.now();
            const delta = Math.min(1/30, (now - lastTimestamp) / 1000);
            lastTimestamp = now;
            
            smoothX += (pointerX - smoothX) * 0.08;
            smoothY += (pointerY - smoothY) * 0.08;
            time += delta * 1.2;
            
            updatePositionsWithDistortion();
            updateColorsByMouse();
            
            camera.position.x += ( (smoothX - 0.5) * 0.6 - camera.position.x ) * 0.05;
            camera.position.y += ( (smoothY - 0.5) * 0.4 - camera.position.y ) * 0.05;
            camera.lookAt(0, 0, 0);
            
            effectComposer.render();
            requestAnimationFrame(animate);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // 点击跳转到文字粒子风暴页面（移动端同样生效）
        document.addEventListener('click', () => {
            window.location.href = 'first.html';
        });
        
        console.log('%c✨ 梦幻星云已启动 | 支持触摸滑动 ✨', 'color: #ff66cc; font-size: 16px;');
    </script>
</body>
</html>
