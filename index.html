<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>梦幻粒子星云 · 鼠标扭曲流光 | 炫酷前端特效</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.8);
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
            letter-spacing: 1px;
            font-weight: 300;
            border-left: 3px solid #ff66cc;
        }
        #instruction {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            font-family: monospace;
        }
        @media (max-width: 600px) {
            #info, #instruction { font-size: 10px; opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div id="info">
        ✨ 梦幻粒子星云 | 鼠标移动 → 扭曲时空 & 流光变色
    </div>
    <div id="instruction">
        🖱️ 左右滑动 → 改变漩涡强度 | 上下滑动 → 改变色调
    </div>

    <!-- 引入 Three.js 核心库以及扩展 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118); // 深邃星空蓝黑背景
        scene.fog = new THREE.FogExp2(0x010118, 0.0006); // 轻微雾效增强层次感

        // 透视相机 (视角, 宽高比, 近平面, 远平面)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 5, 18);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- 后期特效：发光 Bloom (让粒子产生光晕，增强梦幻感)
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
        bloomPass.threshold = 0.1;  // 亮度阈值
        bloomPass.strength = 1.1;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // --- 简单控制：允许用户可选地旋转视角 (但不必须，为了好玩加一点自动旋转倾向，但不强制)
        // 为了让有经验的用户可拖拽，但为了保持"扭曲效果"，不干扰鼠标扭曲，我们不加 OrbitControls，而是让相机轻微自动环绕？不，为了聚焦粒子效果，相机固定但旋转粒子系统整体? 不对，鼠标扭曲粒子位置即可。
        // 为了增加视觉丰富度，添加一个慢慢旋转的背景星空球（非常轻微的旋转）
        
        // ---------- 核心：粒子系统 ----------
        const PARTICLE_COUNT = 6500;
        // 存储粒子的原始位置（球状分布 + 轻微螺旋扰动）和颜色因子
        const positionsOriginal = new Float32Array(PARTICLE_COUNT * 3);
        const colorHues = new Float32Array(PARTICLE_COUNT); // 存储每个粒子的基准色相 (0-1)
        
        // 几何体：用于 Points 对象
        const geometry = new THREE.BufferGeometry();
        
        // 临时变量：生成分布的半径范围
        const radiusMin = 2.8;
        const radiusMax = 6.5;
        
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            // 采用球状分布 + 略微的螺旋扭曲倾向，让原始形状看起来像星系雏形
            // 方法: 随机单位向量 + 半径变化，再额外根据角度调整 y 轴，形成扁平的云
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = radiusMin + Math.random() ** 1.5 * (radiusMax - radiusMin);
            
            // 标准球面坐标
            let x = r * Math.sin(phi) * Math.cos(theta);
            let y = r * Math.sin(phi) * Math.sin(theta) * 0.6; // 压扁一点，更像星云盘
            let z = r * Math.cos(phi) * 1.2;
            
            // 增加微妙的螺旋偏移：根据角度使得粒子在赤道面附近形成旋臂感觉
            const spiralFactor = 0.5;
            const angle = Math.atan2(z, x);
            const armOffset = Math.sin(angle * 3) * 0.8;
            x += armOffset * 0.5;
            z += armOffset * 0.3;
            y += Math.sin(angle * 2) * 0.4;
            
            positionsOriginal[i*3] = x;
            positionsOriginal[i*3+1] = y;
            positionsOriginal[i*3+2] = z;
            
            // 颜色色相: 根据半径和角度渐变，从紫红(0.7) 到 蓝绿(0.5) 再到 亮粉(0.9)
            const hueFactor = (r - radiusMin) / (radiusMax - radiusMin);
            const angleHue = (angle + Math.PI) / (2 * Math.PI);
            let hue = 0.6 + hueFactor * 0.3 + angleHue * 0.2;
            hue = hue % 1.0;
            colorHues[i] = hue;
        }
        
        geometry.setAttribute('position', new THREE.BufferAttribute(positionsOriginal.slice(), 3));
        
        // 自定义着色器材质？为了更高性能和华丽效果，我们可以用 PointsMaterial 并支持动态颜色更新。
        // 但为了让每个粒子独立颜色并且可以随着鼠标变化整体色调偏移，我们使用 PointsMaterial + vertexColors。
        // 更简单酷炫: 直接使用 ShaderMaterial 太复杂，我们用 PointsMaterial 并动态更新颜色数组（性能依然不错，因为6500个点不多）
        
        // 准备颜色数组 (初始)
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const hue = colorHues[i];
            const color = new THREE.Color().setHSL(hue, 1.0, 0.55);
            colors[i*3] = color.r;
            colors[i*3+1] = color.g;
            colors[i*3+2] = color.b;
        }
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        // 创建圆形渐变纹理 (让每个粒子看起来有光晕感)
        const createParticleTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(16, 16, 14, 0, 2 * Math.PI);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            ctx.shadowBlur = 0;
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 14);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.4, 'rgba(255,180,100,0.9)');
            gradient.addColorStop(0.7, 'rgba(255,80,120,0.6)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        };
        
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.22,
            map: createParticleTexture(),
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.95,
            depthWrite: false
        });
        
        const particleSystem = new THREE.Points(geometry, particleMaterial);
        scene.add(particleSystem);
        
        // 增加一个极简的星光背景 (使用小粒子球包裹)
        const bgStarGeometry = new THREE.BufferGeometry();
        const bgStarCount = 1800;
        const bgPositions = new Float32Array(bgStarCount * 3);
        for (let i = 0; i < bgStarCount; i++) {
            // 分布在大球壳上，半径 40-80
            const rad = 45 + Math.random() * 35;
            const thetaBg = Math.random() * Math.PI * 2;
            const phiBg = Math.acos(2 * Math.random() - 1);
            bgPositions[i*3] = rad * Math.sin(phiBg) * Math.cos(thetaBg);
            bgPositions[i*3+1] = rad * Math.sin(phiBg) * Math.sin(thetaBg) * 0.5;
            bgPositions[i*3+2] = rad * Math.cos(phiBg);
        }
        bgStarGeometry.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
        const bgStarMaterial = new THREE.PointsMaterial({
            color: 0xaaccff,
            size: 0.08,
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending
        });
        const bgStars = new THREE.Points(bgStarGeometry, bgStarMaterial);
        scene.add(bgStars);
        
        // 轻微旋转星空
        function animateStars() {
            bgStars.rotation.y += 0.0005;
            bgStars.rotation.x += 0.0003;
            requestAnimationFrame(animateStars);
        }

        animateStars();
        
        


        // --- 鼠标交互数据 ---
        let mouseX = 0.5;   // 范围 0-1, 初始中间
        let mouseY = 0.5;
        window.addEventListener('mousemove', (event) => {
            mouseX = event.clientX / window.innerWidth;
            mouseY = event.clientY / window.innerHeight;
        });
        
        // 为了使鼠标移动更有"拖拽感"，增加一个平滑因子
        let smoothMouseX = 0.5;
        let smoothMouseY = 0.5;
        
        // 存储动画中的粒子位置 (用于更新)
        // 我们需要在每帧动态计算每个粒子的偏移，以达到"鼠标扭曲磁场"效果
        // 方案：每个粒子根据原始位置，与鼠标方向产生正弦扭曲，同时整体自旋
        
        let time = 0;
        
        // 获取 attribute 引用
        const positionAttribute = geometry.attributes.position;
        const posArray = positionAttribute.array;
        
        // 为了避免 GC，我们在动画里直接修改 posArray，然后设置 needsUpdate
        
        // 辅助函数：更新粒子颜色随鼠标Y轴整体色调偏移
        function updateColorsByMouse() {
            // 鼠标Y控制整体色相偏移 (0->0.3 偏移，范围：红色到蓝色)
            const hueShift = (smoothMouseY - 0.5) * 1.2;  // -0.6 ～ 0.6
            const colorsArray = geometry.attributes.color.array;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let newHue = colorHues[i] + hueShift;
                if (newHue < 0) newHue += 1;
                if (newHue > 1) newHue -= 1;
                const col = new THREE.Color().setHSL(newHue, 1.0, 0.55);
                colorsArray[i*3] = col.r;
                colorsArray[i*3+1] = col.g;
                colorsArray[i*3+2] = col.b;
            }
            geometry.attributes.color.needsUpdate = true;
        }
        
        // 鼠标扭曲效果：位置更新
        function updatePositionsWithDistortion() {
            // 扭曲强度：鼠标X (0~1) 映射到 0.3 ~ 2.5 扭曲幅度
            const strength = 0.5 + smoothMouseX * 1.8;
            // 整体旋转速度也受鼠标X影响: 基础旋转 + 鼠标影响的额外绕Y轴旋转
            const baseRotY = time * 0.15;
            const extraRotY = (smoothMouseX - 0.5) * 1.5;
            const totalRotY = baseRotY + extraRotY;
            
            // 绕X轴的小幅摆动也受鼠标Y影响
            const rotX = (smoothMouseY - 0.5) * 0.6;
            
            const cosRY = Math.cos(totalRotY);
            const sinRY = Math.sin(totalRotY);
            const cosRX = Math.cos(rotX);
            const sinRX = Math.sin(rotX);
            
            // 遍历每个粒子，计算扭曲后的新位置
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const ix = i * 3;
                const origX = positionsOriginal[ix];
                const origY = positionsOriginal[ix+1];
                const origZ = positionsOriginal[ix+2];
                
                // 1. 先做基础旋转 (让星云整体缓慢自转)
                let x1 = origX * cosRY - origZ * sinRY;
                let z1 = origX * sinRY + origZ * cosRY;
                let y1 = origY;
                
                // 绕X轴旋转 (制造翻滚感)
                let y2 = y1 * cosRX - z1 * sinRX;
                let z2 = y1 * sinRX + z1 * cosRX;
                let x2 = x1;
                
                // 2. 鼠标扭曲场: 根据粒子到中心的距离和方向，产生波浪偏移
                // 使用正弦函数，制造粒子流动的感觉
                const radius = Math.sqrt(x2*x2 + y2*y2 + z2*z2);
                const normX = x2 / (radius + 0.001);
                const normY = y2 / (radius + 0.001);
                const normZ = z2 / (radius + 0.001);
                
                // 扭曲偏移量：依赖于鼠标X强度，以及粒子角度和时间的正弦波
                const angleYZ = Math.atan2(y2, z2);
                const angleXZ = Math.atan2(x2, z2);
                const wave1 = Math.sin(angleXZ * 4.0 + time * 2.0) * 0.2;
                const wave2 = Math.cos(angleYZ * 3.0 - time * 1.5) * 0.15;
                const distortStrength = strength * 0.4;
                
                // 偏移方向垂直于当前位置，让粒子像被吹动
                const offsetX = normY * wave1 * distortStrength + normZ * wave2 * 0.2;
                const offsetY = normZ * wave2 * distortStrength + normX * wave1 * 0.2;
                const offsetZ = normX * wave1 * distortStrength + normY * wave2 * 0.2;
                
                // 最终位置
                let finalX = x2 + offsetX;
                let finalY = y2 + offsetY;
                let finalZ = z2 + offsetZ;
                
                posArray[ix] = finalX;
                posArray[ix+1] = finalY;
                posArray[ix+2] = finalZ;
            }
            positionAttribute.needsUpdate = true;
        }
        
        // 添加一点点漂浮粒子云辅助 (可选小光晕)
        // 增加一个微弱的环境光，让后期 bloom 更丰富 (并非必要，但有助于整体)
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        
        // 轻轻加一个点光源让粒子材质有高光感(PointsMaterial不需要，但为了氛围)
        const backLight = new THREE.PointLight(0x4466ff, 0.5);
        backLight.position.set(2, 3, 4);
        scene.add(backLight);
        
        // --- 动画循环 & 平滑鼠标数据 ---
        let lastTimestamp = 0;
        
        function animate() {
            const now = performance.now();
            const delta = Math.min(1/30, (now - lastTimestamp) / 1000);
            lastTimestamp = now;
            
            // 平滑鼠标值，制造拖尾感
            smoothMouseX += (mouseX - smoothMouseX) * 0.08;
            smoothMouseY += (mouseY - smoothMouseY) * 0.08;
            
            // 更新时间 (影响波浪运动)
            time += delta * 1.2;
            
            // 更新粒子的位置扭曲
            updatePositionsWithDistortion();
            // 更新颜色随着鼠标Y变化
            updateColorsByMouse();
            
            // 相机轻微环绕? 简单晃动增加沉浸感 (根据鼠标位置轻微移动相机)
            // 但为了不掩盖粒子扭曲，只做极微偏移
            camera.position.x += ( (smoothMouseX - 0.5) * 0.6 - camera.position.x ) * 0.05;
            camera.position.y += ( (smoothMouseY - 0.5) * 0.4 - camera.position.y ) * 0.05;
            camera.lookAt(0, 0, 0);
            
            // 使用效果合成器渲染
            effectComposer.render();
            
            requestAnimationFrame(animate);
        }
        
        // 启动动画
        animate();
        
        // 窗口适配
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 小彩蛋：控制台输出
        console.log('%c✨ 梦幻星云已启动 | 移动鼠标扭曲时空 ✨', 'color: #ff66cc; font-size: 16px;');
    document.addEventListener('click', function() {
    console.log('✅ 页面被点击，准备跳转到 first.html');
    window.location.href = 'first.html';
    });
    </script>
</body>
</html>
