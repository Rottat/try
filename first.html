<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>星云粒子问答 · 全粒子构成 | 星尘跃迁 | 自适应星域</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            background-color: #010010;
            touch-action: pan-x pan-y; /* 保留基础滚动，但canvas覆盖全屏且无滚动条，此设置不影响内部射线检测 */
        }
        /* 星云智核控制台 - 半透明辅助界面，但问答内容由粒子表现 */
        .nebula-console {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 88%;
            max-width: 560px;
            background: rgba(6, 10, 28, 0.8);
            backdrop-filter: blur(18px);
            border-radius: 56px;
            border: 1px solid rgba(80, 200, 255, 0.8);
            box-shadow: 0 0 48px rgba(0, 160, 255, 0.4);
            padding: 18px 22px;
            z-index: 40;
            transition: all 0.45s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            opacity: 0;
            visibility: hidden;
            font-family: monospace;
            pointer-events: none;
        }
        .nebula-console.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            bottom: 45px;
        }
        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid rgba(0, 220, 210, 0.6);
            margin-bottom: 16px;
            padding-bottom: 8px;
            color: #3ef;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .theme-chip {
            font-size: 12px;
            background: rgba(0, 200, 255, 0.25);
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: normal;
        }
        .chat-window {
            max-height: 260px;
            overflow-y: auto;
            margin-bottom: 18px;
            padding-right: 5px;
            scrollbar-width: thin;
        }
        .chat-window p {
            margin: 10px 0;
            font-size: 13px;
            line-height: 1.4;
            word-break: break-word;
            background: rgba(0,0,0,0.5);
            border-radius: 14px;
            padding: 8px 12px;
        }
        .user-msg {
            color: #bbdaff;
            border-left: 3px solid #0cf;
        }
        .ai-msg {
            color: #ffd7a0;
            border-left: 3px solid #ffaa55;
        }
        .input-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(0, 0, 0, 0.65);
            border-radius: 80px;
            padding: 5px 12px;
            border: 1px solid rgba(0, 210, 200, 0.6);
        }
        .input-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: #0cf;
            font-family: monospace;
            font-size: 15px;
            outline: none;
            padding: 12px 6px;
        }
        .input-bar input::placeholder {
            color: rgba(0, 200, 255, 0.7);
        }
        .input-bar button {
            background: rgba(0, 200, 255, 0.25);
            border: none;
            border-radius: 50px;
            color: #0cf;
            padding: 8px 20px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-bar button:active {
            transform: scale(0.95);
            background: rgba(0, 200, 255, 0.7);
        }
        .collapse-btn {
            margin-top: 14px;
            text-align: center;
            font-size: 12px;
            color: rgba(220, 220, 255, 0.85);
            cursor: pointer;
            background: rgba(20, 20, 55, 0.8);
            border-radius: 40px;
            padding: 8px;
            transition: 0.2s;
            font-weight: 500;
        }
        .collapse-btn:active {
            background: rgba(0, 200, 255, 0.4);
            color: #0cf;
        }
        .gate-back {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 40px;
            color: #ccf;
            font-size: 13px;
            cursor: pointer;
            z-index: 60;
            font-family: monospace;
            border: 0.5px solid rgba(100, 200, 255, 0.8);
            transition: 0.2s;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .gate-back:active {
            background: rgba(0, 200, 255, 0.5);
            transform: scale(0.96);
        }
        .nebula-hint {
            position: absolute;
            bottom: 18px;
            left: 18px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 6px 14px;
            font-size: 11px;
            color: #bbf;
            pointer-events: none;
            z-index: 45;
        }
        @media (max-width: 600px) {
            .nebula-console { width: 90%; padding: 14px; bottom: 20px; }
            .chat-window p { font-size: 11px; }
            .gate-back { top: 12px; right: 12px; padding: 6px 14px; font-size: 11px; }
            .input-bar input { font-size: 14px; padding: 10px 5px; }
            .input-bar button { padding: 6px 16px; }
        }
        /* 触屏引导提示优雅 */
        .touch-guide {
            position: absolute;
            bottom: 100px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 30;
            color: #9cf;
            font-size: 13px;
            text-shadow: 0 0 6px #06f;
            background: rgba(0,0,0,0.4);
            width: fit-content;
            margin: 0 auto;
            padding: 5px 15px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="gate-back" id="returnToIndex">🌀 星门</div>
    <div id="oracleConsole" class="nebula-console">
        <div class="console-header">
            <span>✦ 星云粒子核心 ✦</span>
            <span class="theme-chip" id="currentThemeLabel">—</span>
        </div>
        <div class="chat-window" id="chatMessages">
            <p class="ai-msg">🌌 星尘凝聚，触碰粒子文字唤醒星云回响...</p>
        </div>
        <div class="input-bar">
            <input type="text" id="nebulaInput" placeholder="粒子输入... 你的文字将化为星尘" autocomplete="off">
            <button id="askNebulaBtn">⤦ 星尘回响</button>
        </div>
        <div class="collapse-btn" id="collapseToWordsBtn">✨ 星云殿堂 ✨</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- 移动端优化 & 场景搭建 (增强自适应)---
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020115);
        scene.fog = new THREE.FogExp2(0x020115, 0.004);
        
        // 自适应相机: 根据屏幕比例微调视野确保星云团全览
        let camera = new THREE.PerspectiveCamera(44, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 1.0, isMobile ? 15.8 : 14.5);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: !isMobile });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);
        
        // 后期 bloom
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.95, 0.35, 0.7);
        bloomPass.threshold = 0.08;
        bloomPass.strength = isMobile ? 0.75 : 0.98;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // 背景星群
        const starFieldCount = isMobile ? 1800 : 3000;
        const starFieldGeo = new THREE.BufferGeometry();
        const starPositions = [];
        for (let i = 0; i < starFieldCount; i++) {
            starPositions.push((Math.random() - 0.5) * 280);
            starPositions.push((Math.random() - 0.5) * 150);
            starPositions.push((Math.random() - 0.5) * 120 - 60);
        }
        starFieldGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPositions), 3));
        const starFieldMat = new THREE.PointsMaterial({ color: 0x88aaff, size: isMobile ? 0.09 : 0.12, transparent: true, opacity: 0.45, blending: THREE.AdditiveBlending });
        const starField = new THREE.Points(starFieldGeo, starFieldMat);
        scene.add(starField);
        
        // 动态星云涡旋
        const swirlCount = isMobile ? 1000 : 1600;
        const swirlGeo = new THREE.BufferGeometry();
        const swirlPositions = [];
        const swirlColors = [];
        for (let i = 0; i < swirlCount; i++) {
            const r = 2.5 + Math.random() ** 1.3 * 5.2;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta) * 0.7;
            const z = r * Math.cos(phi) * 1.1;
            swirlPositions.push(x, y, z);
            const hue = 0.5 + Math.random() * 0.45;
            const col = new THREE.Color().setHSL(hue, 1.0, 0.6);
            swirlColors.push(col.r, col.g, col.b);
        }
        swirlGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(swirlPositions), 3));
        swirlGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(swirlColors), 3));
        const swirlMat = new THREE.PointsMaterial({ size: 0.07, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true });
        const swirlCloud = new THREE.Points(swirlGeo, swirlMat);
        scene.add(swirlCloud);
        
        // 生成粒子文字 (单词)
        function createParticleWord(word, baseHue, hueVar = 0.22, particleSize = 0.11, offset = { x: 0, y: 0, z: 0 }) {
            const canvas = document.createElement('canvas');
            canvas.width = 620;
            canvas.height = 250;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            let fontSize = isMobile ? 96 : 112;
            ctx.font = `Bold ${fontSize}px "Segoe UI", "Poppins", "Courier New"`;
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(word, canvas.width/2, canvas.height/2);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const positions = [];
            const colors = [];
            const step = isMobile ? 4 : 3;
            for (let y = 0; y < canvas.height; y += step) {
                for (let x = 0; x < canvas.width; x += step) {
                    const idx = (y * canvas.width + x) * 4;
                    if (data[idx] > 200) {
                        const px = (x / canvas.width) * 5.6 - 2.8;
                        const py = (1 - y / canvas.height) * 2.3 - 1.15;
                        const pz = (Math.random() - 0.5) * 0.2;
                        positions.push(px + offset.x, py + offset.y, pz + offset.z);
                        const hue = (baseHue + (Math.random() - 0.5) * hueVar) % 1.0;
                        const col = new THREE.Color().setHSL(hue, 1.0, 0.68);
                        colors.push(col.r, col.g, col.b);
                    }
                }
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
            const material = new THREE.PointsMaterial({ size: particleSize, vertexColors: true, blending: THREE.AdditiveBlending });
            const pointsObj = new THREE.Points(geometry, material);
            return { points: pointsObj, positions: positions, colors: colors };
        }
        
        // 生成星云团粒子视觉效果 + 不可见交互碰撞体(解决移动端点击跳转)
        function createNebulaCluster(colorHex, radius, pos, targetUrl, clusterName) {
            // 视觉粒子
            const count = isMobile ? 400 : 800;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const r = radius * Math.pow(Math.random(), 1.2);
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi);
                positions[i*3] = x + pos.x;
                positions[i*3+1] = y + pos.y;
                positions[i*3+2] = z + pos.z;
                const col = new THREE.Color(colorHex);
                colors[i*3] = col.r;
                colors[i*3+1] = col.g;
                colors[i*3+2] = col.b;
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            const material = new THREE.PointsMaterial({ size: 0.08, vertexColors: true, blending: THREE.AdditiveBlending });
            const visualCluster = new THREE.Points(geometry, material);
            scene.add(visualCluster);
            
            // 重要: 添加不可见的交互球体(Mesh)，保证移动端轻触即可选中，跳转更灵敏
            const interactRadius = radius * 1.35;
            const sphereGeo = new THREE.SphereGeometry(interactRadius, 8, 8);
            const sphereMat = new THREE.MeshBasicMaterial({ visible: false, transparent: true, opacity: 0 });
            const triggerZone = new THREE.Mesh(sphereGeo, sphereMat);
            triggerZone.position.set(pos.x, pos.y, pos.z);
            triggerZone.userData = { isPortal: true, target: targetUrl, name: clusterName };
            scene.add(triggerZone);
            
            // 添加微光点缀
            const pointLight = new THREE.PointLight(colorHex, 0.55, 8);
            pointLight.position.set(pos.x, pos.y, pos.z);
            scene.add(pointLight);
            
            return { visual: visualCluster, triggerZone, light: pointLight, target: targetUrl };
        }
        
        const wordsLibrary = [
            { name: 'SCI-FI', hue: 0.58, var: 0.22, offset: { x: -3.5, y: 1.3, z: 0.2 }, size: 0.115 },
            { name: 'PHILOSOPHY', hue: 0.84, var: 0.28, offset: { x: 0.0, y: -0.75, z: 0.45 }, size: 0.105 },
            { name: 'FUNNY', hue: 0.12, var: 0.24, offset: { x: 3.3, y: 1.15, z: 0.1 }, size: 0.115 }
        ];
        
        const wordParticleSystems = [];
        const allMovableParticles = [];
        wordsLibrary.forEach((cfg, idx) => {
            const { points, positions, colors } = createParticleWord(cfg.name, cfg.hue, cfg.var, cfg.size, cfg.offset);
            scene.add(points);
            wordParticleSystems.push({ points, name: cfg.name, offset: cfg.offset, origPositions: positions.slice() });
            allMovableParticles.push({
                ref: points,
                origPos: positions.slice(),
                currentPosAttr: points.geometry.attributes.position.array,
                colorAttr: points.geometry.attributes.color.array,
                particleCount: positions.length / 3,
                velocities: null
            });
        });
        
        // 漂浮星尘
        const dustCount = isMobile ? 1300 : 2200;
        const dustGeo = new THREE.BufferGeometry();
        const dustPosArray = [];
        for (let i = 0; i < dustCount; i++) {
            dustPosArray.push((Math.random() - 0.5) * 18, (Math.random() - 0.5) * 13, (Math.random() - 0.5) * 18 - 5);
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dustPosArray), 3));
        const dustMat = new THREE.PointsMaterial({ color: 0x99ccff, size: 0.045, transparent: true, opacity: 0.45, blending: THREE.AdditiveBlending });
        const starDustField = new THREE.Points(dustGeo, dustMat);
        scene.add(starDustField);
        allMovableParticles.push({
            ref: starDustField,
            origPos: dustPosArray.slice(),
            currentPosAttr: starDustField.geometry.attributes.position.array,
            particleCount: dustCount,
            velocities: null
        });
        
        // 星云光环粒子
        const ringCount = isMobile ? 800 : 1300;
        const ringGeom = new THREE.BufferGeometry();
        const ringPositions = [];
        const ringColorList = [];
        for (let i = 0; i < ringCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.1 + Math.random() * 1.8;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = Math.sin(angle * 2.2) * 0.8;
            ringPositions.push(x, y, z);
            const hueRing = 0.55 + Math.random() * 0.35;
            const colRing = new THREE.Color().setHSL(hueRing, 1.0, 0.65);
            ringColorList.push(colRing.r, colRing.g, colRing.b);
        }
        ringGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(ringPositions), 3));
        ringGeom.setAttribute('color', new THREE.BufferAttribute(new Float32Array(ringColorList), 3));
        const ringPointsMat = new THREE.PointsMaterial({ size: 0.065, vertexColors: true, blending: THREE.AdditiveBlending });
        const ringNebula = new THREE.Points(ringGeom, ringPointsMat);
        scene.add(ringNebula);
        allMovableParticles.push({
            ref: ringNebula,
            origPos: ringPositions.slice(),
            currentPosAttr: ringNebula.geometry.attributes.position.array,
            particleCount: ringCount,
            velocities: null
        });
        
        // --- 节点: 星云团 portal (带交互区域) 增强跳转---
        const portalPositions = [
            { x: -4.8, y: 2.6, z: -1.4, color: 0xff66aa, target: 'new.html', label: '✨ 星云之境 ✨' },
            { x: 0, y: 3.7, z: -1.8, color: 0x66ffaa, target: 'new1.html', label: '🌠 流光幻境 🌠' },
            { x: 4.8, y: 2.6, z: -1.4, color: 0xffaa66, target: 'new2.html', label: '🌀 文字神谕 🌀' },
            { x: -4.5, y: -2.8, z: 1.4, color: 0xff88cc, target: 'new3.html', label: '✨ 混乱之境 ✨' },
            { x: 0, y: -3.6, z: 1.2, color: 0x88aaff, target: 'new4.html', label: '🌌 世外之境 🌌' },
            { x: 4.5, y: -2.8, z: 1.4, color: 0xffaa88, target: 'new5.html', label: '🌀 迷失之境 🌀' }
        ];
        const portalClusters = [];
        portalPositions.forEach((p, idx) => {
            const cluster = createNebulaCluster(p.color, 0.68, { x: p.x, y: p.y, z: p.z }, p.target, p.label);
            portalClusters.push({
                triggerZone: cluster.triggerZone,
                target: p.target,
                visual: cluster.visual,
                light: cluster.light
            });
        });
        
        // 文字触碰交互区域 (不可见盒子)
        const clickZones = [];
        wordsLibrary.forEach((cfg, idx) => {
            const boxGeo = new THREE.BoxGeometry(3.2, 1.6, 1.0);
            const boxMat = new THREE.MeshBasicMaterial({ visible: false });
            const mesh = new THREE.Mesh(boxGeo, boxMat);
            mesh.position.set(cfg.offset.x, cfg.offset.y, cfg.offset.z);
            scene.add(mesh);
            clickZones.push({ mesh, idx, name: cfg.name });
        });
        
        let explosionActive = false;
        let dialogModeActive = false;
        let currentTheme = 'SCI-FI';
        let collapseAnimating = false;
        
        // 通用射线检测跳转处理器 (包含单词区与星云团)
        function handleCanvasPick(clientX, clientY) {
            if (dialogModeActive || explosionActive || collapseAnimating) return false;
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((clientY - rect.top) / rect.height) * 2 + 1;
            const raycasterLocal = new THREE.Raycaster();
            raycasterLocal.setFromCamera(new THREE.Vector2(x, y), camera);
            
            // 优先检测星云团跳转区域(交互球体)
            const portalTriggers = portalClusters.map(c => c.triggerZone);
            const portalIntersects = raycasterLocal.intersectObjects(portalTriggers);
            if (portalIntersects.length > 0) {
                const hitTrigger = portalIntersects[0].object;
                const clusterData = portalClusters.find(c => c.triggerZone === hitTrigger);
                if (clusterData && clusterData.target) {
                    window.location.href = clusterData.target;
                }
                return true;
            }
            
            // 检测文字粒子区域
            const wordZoneIntersects = raycasterLocal.intersectObjects(clickZones.map(z => z.mesh));
            if (wordZoneIntersects.length) {
                const zone = clickZones.find(z => z.mesh === wordZoneIntersects[0].object);
                if (zone && !explosionActive && !dialogModeActive && !collapseAnimating) {
                    igniteShockwave(zone.name, zone.idx);
                }
                return true;
            }
            return false;
        }
        
        function igniteShockwave(themeName, wordIdx) {
            if (explosionActive || dialogModeActive || collapseAnimating) return;
            explosionActive = true;
            currentTheme = themeName;
            document.getElementById('currentThemeLabel').innerText = themeName;
            const center = wordsLibrary[wordIdx].offset;
            for (let p of allMovableParticles) {
                const posAttr = p.currentPosAttr;
                const count = p.particleCount;
                if (!p.velocities) p.velocities = new Array(count * 3).fill(0);
                for (let i = 0; i < count; i++) {
                    const ix = i * 3;
                    const px = posAttr[ix];
                    const py = posAttr[ix+1];
                    const pz = posAttr[ix+2];
                    let dx = px - center.x;
                    let dy = py - center.y;
                    let dz = pz - center.z;
                    let len = Math.hypot(dx, dy, dz) + 0.25;
                    let force = 1.7 / (len * 0.45 + 0.2);
                    force = Math.min(force, 2.2);
                    p.velocities[ix] = (dx / len) * force * (0.7 + Math.random() * 0.9);
                    p.velocities[ix+1] = (dy / len) * force * (0.7 + Math.random() * 0.9);
                    p.velocities[ix+2] = (dz / len) * force * (0.7 + Math.random() * 0.9);
                    p.velocities[ix] += (Math.random() - 0.5) * 0.65;
                    p.velocities[ix+1] += (Math.random() - 0.5) * 0.65;
                    p.velocities[ix+2] += (Math.random() - 0.5) * 0.65;
                }
            }
            setTimeout(() => {
                if (explosionActive) enterDialogModeWithNebula();
            }, 880);
        }
        
        function enterDialogModeWithNebula() {
            explosionActive = false;
            dialogModeActive = true;
            wordParticleSystems.forEach(sys => sys.points.visible = false);
            for (let p of allMovableParticles) {
                const positions = p.currentPosAttr;
                const count = p.particleCount;
                for (let i = 0; i < count; i++) {
                    const ix = i * 3;
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 2.0 + Math.random() * 2.8;
                    const yVar = (Math.random() - 0.5) * 2.2;
                    positions[ix] = Math.cos(angle) * radius;
                    positions[ix+2] = Math.sin(angle) * radius;
                    positions[ix+1] = yVar + Math.sin(angle * 2.5) * 0.7;
                }
                p.ref.geometry.attributes.position.needsUpdate = true;
            }
            const panel = document.getElementById('oracleConsole');
            panel.classList.add('active');
            const chatDiv = document.getElementById('chatMessages');
            chatDiv.innerHTML = '';
            const welcomeMsg = getThemeIntro(currentTheme);
            createParticleMessage(welcomeMsg, 0.0, 3200, 0.8);
            addAIMessage(welcomeMsg);
            bloomPass.strength = 1.05;
            setTimeout(() => bloomPass.strength = isMobile ? 0.8 : 0.98, 600);
        }
        
        function startCollapseAnimation() {
            if (!dialogModeActive || collapseAnimating) {
                if (!dialogModeActive && !collapseAnimating) {
                    createParticleMessage("✨ 请先触碰星尘文字 (SCI-FI / PHILOSOPHY / FUNNY) 开启对话 ✨", 0.1, 2500, 0.2);
                }
                return;
            }
            collapseAnimating = true;
            dialogModeActive = false;
            explosionActive = false;
            document.getElementById('oracleConsole').classList.remove('active');
            const systemsData = [];
            for (let p of allMovableParticles) {
                const currentPos = p.currentPosAttr.slice();
                const targetPos = p.origPos.slice();
                systemsData.push({
                    ref: p,
                    current: currentPos,
                    target: targetPos,
                    count: p.particleCount
                });
            }
            wordParticleSystems.forEach(sys => sys.points.visible = true);
            let startTime = performance.now();
            const duration = 800;
            function animateCollapse(now) {
                const elapsed = now - startTime;
                let t = Math.min(1, elapsed / duration);
                const ease = 1 - Math.pow(1 - t, 3);
                for (let data of systemsData) {
                    const posAttr = data.ref.currentPosAttr;
                    for (let i = 0; i < data.count; i++) {
                        const ix = i * 3;
                        posAttr[ix] = data.current[ix] + (data.target[ix] - data.current[ix]) * ease;
                        posAttr[ix+1] = data.current[ix+1] + (data.target[ix+1] - data.current[ix+1]) * ease;
                        posAttr[ix+2] = data.current[ix+2] + (data.target[ix+2] - data.current[ix+2]) * ease;
                    }
                    data.ref.ref.geometry.attributes.position.needsUpdate = true;
                }
                if (t < 1) requestAnimationFrame(animateCollapse);
                else collapseAnimating = false;
            }
            requestAnimationFrame(animateCollapse);
        }
        
        function getThemeIntro(theme) {
            const intros = {
                'SCI-FI': '⚡ 超弦粒子涌动，未来预言层激活。向星云提问，粒子将重组预言。',
                'PHILOSOPHY': '📜 哲思星云低语，智慧尘环旋转... 你的问题会引出粒子箴言。',
                'FUNNY': '😂 笑尘星云裂开，幽默粒子正在爆裂重组，请发问！'
            };
            return intros[theme];
        }
        
        function getAnswerByTheme(theme, question) {
            const answersDB = {
                'SCI-FI': { kw: { "未来": "🔮 时间线扰动：三个月内你会迎来创造力的奇点。", "科技": "💡 星辰代码将与量子思维共振。", "宇宙": "🌠 你体内有星尘，渺小却璀璨。" }, defaults: ["🛸 星盟档案：你的选择将扭转熵增。", "🤖 仿生智核预言：大胆行动，宇宙会为你铺路。", "🌌 超光速回响：你将遇见意想不到的盟友。"] },
                'PHILOSOPHY': { kw: { "意义": "意义是你亲手编织的星图，此刻即是存在。", "幸福": "幸福流动在每粒星光的觉察之间。", "死亡": "死亡赋予粒子闪耀的珍贵。" }, defaults: ["🌿 庄子曰：真实如星云，流动不居，你已在答案中。", "💎 柏拉图低语：你看到的不只是影子，真相即将浮现。", "🌀 老子云：道法自然，此刻疑问即道。"] },
                'FUNNY': { kw: { "工作": "💼 工作就像星云，远看美丽，近看全是bug。", "钱": "💰 粒子的浪漫：钱不是万能，没钱粒子都会沉默。", "爱情": "💞 爱是两颗星的引力，无法计算却真实存在。" }, defaults: ["🐣 为什么程序员爱星云？因为云原生是浪漫的！", "🍕 检测到幽默波段，建议立刻吃披萨补充欢乐因子。", "🤣 今日星云定律：笑，宇宙也会跟你闪烁。"] }
            };
            const data = answersDB[theme];
            const lowerQ = question.toLowerCase();
            for (let [kw, ans] of Object.entries(data.kw)) {
                if (lowerQ.includes(kw)) return ans;
            }
            return data.defaults[Math.floor(Math.random() * data.defaults.length)];
        }
        
        function addUserMessage(msg) {
            const chatDiv = document.getElementById('chatMessages');
            const p = document.createElement('p');
            p.className = 'user-msg';
            p.innerHTML = `❯ 你：${msg}`;
            chatDiv.appendChild(p);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            createParticleMessage(`❯ ${msg}`, 0.1, 2800, 0.4);
            ringNebula.material.color.setHex(0xffaa88);
            setTimeout(() => ringNebula.material.color.setHex(0x88aaff), 200);
        }
        
        function addAIMessage(msg) {
            const chatDiv = document.getElementById('chatMessages');
            const p = document.createElement('p');
            p.className = 'ai-msg';
            p.innerHTML = `◉ 星云粒子回响：${msg}`;
            chatDiv.appendChild(p);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            createParticleMessage(msg, 0.2, 3600, 0.6);
            bloomPass.strength = 1.12;
            setTimeout(() => bloomPass.strength = isMobile ? 0.85 : 0.98, 400);
        }
        
        function createParticleMessage(text, hueBaseOffset = 0.0, lifespan = 2800, yOffsetStart = 0.5) {
            const canvas = document.createElement('canvas');
            canvas.width = 800;
            canvas.height = 240;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            let fontSize = 52;
            ctx.font = `${fontSize}px "Segoe UI", "Poppins", "Courier New"`;
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            let displayText = text;
            if (text.length > 28) {
                ctx.font = `42px "Segoe UI", "Poppins", monospace`;
            }
            ctx.fillText(displayText, canvas.width/2, canvas.height/2);
            
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const positions = [];
            const colors = [];
            const step = 4;
            const scaleX = 0.006;
            const scaleY = 0.005;
            for (let y = 0; y < canvas.height; y += step) {
                for (let x = 0; x < canvas.width; x += step) {
                    const idx = (y * canvas.width + x) * 4;
                    if (data[idx] > 200) {
                        const px = (x - canvas.width/2) * scaleX;
                        const py = (canvas.height/2 - y) * scaleY;
                        const pz = (Math.random() - 0.5) * 0.25;
                        positions.push(px, py + yOffsetStart, pz + 1.2);
                        let baseHue = currentTheme === 'SCI-FI' ? 0.58 : (currentTheme === 'PHILOSOPHY' ? 0.82 : 0.12);
                        const hue = (baseHue + hueBaseOffset + (Math.random() - 0.5) * 0.2) % 1.0;
                        const col = new THREE.Color().setHSL(hue, 1.0, 0.7);
                        colors.push(col.r, col.g, col.b);
                    }
                }
            }
            if (positions.length === 0) return null;
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
            const material = new THREE.PointsMaterial({ size: 0.048, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true });
            const particleGroup = new THREE.Points(geometry, material);
            scene.add(particleGroup);
            const startTime = performance.now();
            function animateParticleMessage(now) {
                const elapsed = now - startTime;
                const life = Math.max(0, 1 - elapsed / lifespan);
                material.opacity = life;
                particleGroup.position.y += 0.006;
                particleGroup.rotation.y += 0.01;
                if (life > 0 && elapsed < lifespan) {
                    requestAnimationFrame(animateParticleMessage);
                } else {
                    scene.remove(particleGroup);
                    geometry.dispose();
                    material.dispose();
                }
            }
            requestAnimationFrame(animateParticleMessage);
            return particleGroup;
        }
        
        function addInputParticleEffect(char) {
            if (!char || char.length === 0) return;
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 64, 64);
            ctx.font = `48px monospace`;
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(char, 32, 32);
            const imgData = ctx.getImageData(0, 0, 64, 64);
            const positions = [];
            const colors = [];
            for (let y = 0; y < 64; y += 5) {
                for (let x = 0; x < 64; x += 5) {
                    const idx = (y * 64 + x) * 4;
                    if (imgData.data[idx] > 200) {
                        const px = (x - 32) * 0.02;
                        const py = (32 - y) * 0.02;
                        positions.push(px, py + 0.2, (Math.random() - 0.5) * 0.3);
                        const hue = (currentTheme === 'SCI-FI' ? 0.55 : (currentTheme === 'PHILOSOPHY' ? 0.8 : 0.15)) + (Math.random() - 0.5)*0.15;
                        const col = new THREE.Color().setHSL(hue, 1.0, 0.7);
                        colors.push(col.r, col.g, col.b);
                    }
                }
            }
            if (positions.length === 0) return;
            const geom = new THREE.BufferGeometry();
            geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            geom.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
            const mat = new THREE.PointsMaterial({ size: 0.035, vertexColors: true, blending: THREE.AdditiveBlending });
            const part = new THREE.Points(geom, mat);
            scene.add(part);
            let life = 1.0;
            const start = performance.now();
            function fade(now) {
                const elapsed = now - start;
                life = Math.max(0, 1 - elapsed / 500);
                mat.opacity = life;
                part.position.y += 0.015;
                if (elapsed < 500) requestAnimationFrame(fade);
                else scene.remove(part);
            }
            requestAnimationFrame(fade);
        }
        
        // 交互：移动端touch && 桌面click统一定向到handleCanvasPick
        function onPointerInteraction(clientX, clientY, isTouch = false) {
            const isInteractiveDom = (el) => {
                const interactiveSelectors = ['#nebulaInput', '#askNebulaBtn', '#collapseToWordsBtn', '#returnToIndex', '.input-bar', '.collapse-btn'];
                let target = el;
                while (target && target !== document.body) {
                    for (let sel of interactiveSelectors) {
                        if (target.matches && target.matches(sel)) return true;
                    }
                    target = target.parentElement;
                }
                return false;
            };
            const targetElem = document.elementFromPoint(clientX, clientY);
            if (targetElem && isInteractiveDom(targetElem)) return;
            handleCanvasPick(clientX, clientY);
        }
        
        window.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            if (touch) {
                onPointerInteraction(touch.clientX, touch.clientY, true);
                if (e.target.closest && !e.target.closest('#nebulaInput')) e.preventDefault();
            }
        }, { passive: false });
        
        window.addEventListener('click', (e) => {
            onPointerInteraction(e.clientX, e.clientY, false);
        });
        
        // UI 交互绑定
        const inputField = document.getElementById('nebulaInput');
        const askBtn = document.getElementById('askNebulaBtn');
        askBtn.addEventListener('click', () => {
            if (!dialogModeActive) {
                createParticleMessage("🌀 请先触碰星尘文字 (SCI-FI / PHILOSOPHY / FUNNY) 唤醒星云...", 0.0, 2200, 0.3);
                return;
            }
            const q = inputField.value.trim();
            if (q === "") return;
            addUserMessage(q);
            const ans = getAnswerByTheme(currentTheme, q);
            addAIMessage(ans);
            inputField.value = "";
        });
        inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter' && dialogModeActive) askBtn.click(); });
        inputField.addEventListener('input', (e) => {
            if (dialogModeActive && e.target.value.length > 0) {
                const lastChar = e.target.value.slice(-1);
                if (lastChar && lastChar !== ' ') addInputParticleEffect(lastChar);
            }
        });
        document.getElementById('collapseToWordsBtn').addEventListener('click', startCollapseAnimation);
        document.getElementById('returnToIndex').addEventListener('click', () => { window.location.href = 'index.html'; });
        
        // 动画 & 相机运动
        let timeFlow = 0;
        function updateMotion() {
            if (explosionActive) {
                for (let p of allMovableParticles) {
                    if (!p.velocities) continue;
                    const posAttr = p.currentPosAttr;
                    const count = p.particleCount;
                    for (let i = 0; i < count; i++) {
                        const ix = i * 3;
                        posAttr[ix] += p.velocities[ix] * 0.16;
                        posAttr[ix+1] += p.velocities[ix+1] * 0.16;
                        posAttr[ix+2] += p.velocities[ix+2] * 0.16;
                        p.velocities[ix] *= 0.95;
                        p.velocities[ix+1] *= 0.95;
                        p.velocities[ix+2] *= 0.95;
                    }
                    p.ref.geometry.attributes.position.needsUpdate = true;
                }
            } else if (!dialogModeActive && !collapseAnimating) {
                ringNebula.rotation.y += 0.0015;
                ringNebula.rotation.x = Math.sin(timeFlow * 0.2) * 0.03;
                swirlCloud.rotation.y += 0.0007;
                starField.rotation.y += 0.0002;
                starDustField.rotation.x += 0.0003;
                wordParticleSystems.forEach((sys, idx) => {
                    sys.points.rotation.z = Math.sin(timeFlow * 0.5 + idx) * 0.025;
                });
            } else if (dialogModeActive && !collapseAnimating) {
                ringNebula.rotation.y += 0.006;
                ringNebula.rotation.x = Math.sin(timeFlow) * 0.08;
                swirlCloud.rotation.z += 0.002;
            }
            timeFlow += 0.016;
            if (!dialogModeActive && !explosionActive) {
                camera.position.x += (0 - camera.position.x) * 0.03;
                camera.position.y += (1.0 - camera.position.y) * 0.03;
                camera.lookAt(0, 0, 0);
            } else {
                camera.position.x += (0 - camera.position.x) * 0.05;
                camera.position.y += (0.5 - camera.position.y) * 0.05;
                camera.lookAt(0, 0, 0);
            }
        }
        
        function animate() {
            requestAnimationFrame(animate);
            updateMotion();
            effectComposer.render();
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        console.log('%c✨ 星云粒子圣殿 | 移动端跳转修复+自适应优化 ✨', 'color: #0cf; font-size: 14px;');
    </script>
</body>
