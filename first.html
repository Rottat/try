<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>文字粒子风暴 · 多维控制台</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
        }
        /* 覆盖Three.js canvas */
        canvas {
            display: block;
        }
        /* 控制台面板 — 初始隐藏 */
        .console-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease, visibility 0s linear 0.6s;
            font-family: 'Courier New', monospace;
        }
        .console-panel.active {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.6s ease, visibility 0s linear 0s;
        }
        .terminal {
            width: 85%;
            max-width: 750px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid;
            box-shadow: 0 0 40px rgba(0, 255, 200, 0.3);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .line {
            margin-bottom: 20px;
            line-height: 1.5;
            text-shadow: 0 0 3px currentColor;
        }
        .prompt {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .prompt span {
            font-size: 1.3rem;
            font-weight: bold;
        }
        .prompt input {
            background: transparent;
            border: none;
            font-family: inherit;
            font-size: 1.1rem;
            flex: 1;
            outline: none;
            border-bottom: 1px solid;
            padding: 8px 0;
            color: inherit;
        }
        .prompt input::placeholder {
            opacity: 0.6;
        }
        .output {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px dashed;
            min-height: 130px;
            max-height: 300px;
            overflow-y: auto;
        }
        .output p {
            margin: 10px 0;
            word-break: break-word;
        }
        .back-btn {
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.9rem;
            transition: 0.2s;
            display: inline-block;
            color: inherit;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.02);
        }
        /* 提示小标签 */
        .instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            font-size: 12px;
            pointer-events: none;
            z-index: 15;
            font-family: monospace;
            backdrop-filter: blur(4px);
        }
        @media (max-width: 600px) {
            .terminal { padding: 20px; width: 92%; }
            .line { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="instruction">
        ✨ 点击悬浮文字 → 进入不同主题的 AI 控制台 | 每个世界等你探索
    </div>

    <!-- 控制台容器：不同主题共用结构，内容动态刷新 -->
    <div id="consolePanel" class="console-panel">
        <div class="terminal" id="terminalRoot">
            <!-- 动态内容会在这里填充 -->
        </div>
    </div>

    <!-- 引入Three.js核心库以及扩展 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ---------- 初始化场景 ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // CSS2渲染文字（始终面向相机，便于点击）
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'auto'; // 让文字可点击
        document.body.appendChild(labelRenderer.domElement);

        // ---------- 辅助元素：环境光 + 粒子星空背景 ----------
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        const backLight = new THREE.PointLight(0x4466ff, 0.6);
        backLight.position.set(2, 3, 5);
        scene.add(backLight);

        // 背景星星粒子
        const starGeo = new THREE.BufferGeometry();
        const starCount = 1200;
        const starPos = [];
        for (let i = 0; i < starCount; i++) {
            starPos.push((Math.random() - 0.5) * 200);
            starPos.push((Math.random() - 0.5) * 100);
            starPos.push((Math.random() - 0.5) * 80 - 40);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // 围绕文字的旋转粒子光环（装饰）
        const ringParticleCount = 800;
        const ringGeo = new THREE.BufferGeometry();
        const ringPositions = [];
        for (let i = 0; i < ringParticleCount; i++) {
            const angle = (i / ringParticleCount) * Math.PI * 2;
            const radius = 2.2;
            ringPositions.push(Math.cos(angle) * radius, Math.sin(angle) * radius * 0.5, Math.sin(angle) * radius * 0.8);
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(ringPositions), 3));
        const ringMat = new THREE.PointsMaterial({ color: 0x77aaff, size: 0.05, blending: THREE.AdditiveBlending });
        const ringPoints = new THREE.Points(ringGeo, ringMat);
        scene.add(ringPoints);

        // ---------- 可点击的文字 (CSS2D) ----------
        // 定义三个主题及其样式、位置
        const topics = [
            { name: 'SCI-FI', color: '#0ff', bgGlow: 'rgba(0,255,255,0.2)', posX: -3.2, posY: 0.8, posZ: 0 },
            { name: 'PHILOSOPHY', color: '#f9f', bgGlow: 'rgba(255,0,255,0.2)', posX: 0, posY: -0.5, posZ: 0 },
            { name: 'FUNNY', color: '#ffaa44', bgGlow: 'rgba(255,170,68,0.2)', posX: 3.2, posY: 0.8, posZ: 0 }
        ];

        const labelGroup = [];
        
        topics.forEach(topic => {
            const div = document.createElement('div');
            div.textContent = topic.name;
            div.style.color = topic.color;
            div.style.fontSize = '48px';
            div.style.fontWeight = 'bold';
            div.style.fontFamily = "'Segoe UI', 'Poppins', 'Courier New', monospace";
            div.style.textShadow = `0 0 15px ${topic.color}`;
            div.style.background = topic.bgGlow;
            div.style.padding = '12px 28px';
            div.style.borderRadius = '60px';
            div.style.border = `1px solid ${topic.color}`;
            div.style.backdropFilter = 'blur(8px)';
            div.style.cursor = 'pointer';
            div.style.transition = '0.2s';
            div.style.letterSpacing = '2px';
            
            div.addEventListener('mouseenter', () => {
                div.style.transform = 'scale(1.08)';
                div.style.background = `rgba(255,255,255,0.2)`;
            });
            div.addEventListener('mouseleave', () => {
                div.style.transform = 'scale(1)';
                div.style.background = topic.bgGlow;
            });
            
            // 点击事件：进入对应的控制台
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                openConsole(topic.name.toLowerCase());
            });
            
            const label = new CSS2DObject(div);
            label.position.set(topic.posX, topic.posY, topic.posZ);
            scene.add(label);
            labelGroup.push(label);
        });

        // 添加飘浮粒子群（增强粒子风暴感）
        const particleCount = 2500;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            // 分布在一个球壳范围
            const radius = 3 + Math.random() * 4;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            particlePositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            particlePositions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta) * 0.8;
            particlePositions[i*3+2] = radius * Math.cos(phi);
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.07, transparent: true, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // 简单动画：粒子旋转、光环旋转、星星缓慢漂移
        let time = 0;
        
        // ---------- 控制台模块 (思路二的不同主题) ----------
        const consolePanel = document.getElementById('consolePanel');
        const terminalRoot = document.getElementById('terminalRoot');
        
        // 定义不同主题的配置
        const themes = {
            'sci-fi': {
                name: '⚡ 科幻终端 · 未来应答机',
                color: '#0cf',
                borderColor: '#0cf',
                promptSymbol: '>_',
                answers: [
                    "🛸 星际联邦档案：你的请求已被记录，未来三日内会有超光速信号。",
                    "🤖 AI 核心计算：你接下来的选择将影响平行宇宙的熵值。",
                    "🌌 深空回声：勇气是宇宙中最稀缺的资源，你拥有它。",
                    "🧬 基因解锁：你的创造力等级为 Omega-7，建议立即使用。",
                    "⚙️ 机械低语：系统预测你将完成一个令人惊叹的项目。"
                ],
                keywordMap: {
                    "未来": "🔮 时间线波动显示：12个月内会有重大转折。",
                    "科技": "💻 你的数字意识正在进化，尝试学习一门新语言。",
                    "宇宙": "🌠 你与星辰同源，渺小却璀璨。"
                }
            },
            'philosophy': {
                name: '🧘 哲学沉思录 · 智慧回响',
                color: '#f6f',
                borderColor: '#f6f',
                promptSymbol: '❓',
                answers: [
                    "🌿 庄子曰：你的问题本身就是答案的一部分。",
                    "📜 尼采回响：那无法杀死你的，会使你更强大。",
                    "💎 柏拉图洞穴：你正在走向光，继续前进。",
                    "🌀 老子云：道可道，非常道；此刻你所悟即是。",
                    "✨ 加缪提醒：在荒诞中寻找热爱，便是自由。"
                ],
                keywordMap: {
                    "意义": "生命的意义是创造意义的过程，由你定义。",
                    "幸福": "幸福不是终点，而是旅途中知足的片刻。",
                    "死亡": "死亡是生命的老师，教会我们珍惜此刻。"
                }
            },
            'funny': {
                name: '😂 搞笑工坊 · 无厘头智囊',
                color: '#fa4',
                borderColor: '#fa4',
                promptSymbol: ':)',
                answers: [
                    "🐣 为什么程序员总分不清万圣节和圣诞节？因为 Oct 31 = Dec 25！",
                    "🍕 你的幸运食物：披萨，加双倍芝士。",
                    "🤣 宇宙笑话：你觉得自己很普通，但其实你是限量版。",
                    "🎈 今日吐槽：老板说“再改最后一版”，和“再讲一分钟”都是骗人的。",
                    "🧸 检测到你的幽默指数爆表，建议立刻分享快乐。"
                ],
                keywordMap: {
                    "工作": "💼 工作就像西瓜，有的甜有的水，但总要切开才知道。",
                    "钱": "💰 钱不是万能的，但没有钱，段子都少三分底气。",
                    "爱情": "💕 爱情就像鬼，听过的人多，见过的人少。"
                }
            }
        };
        
        let currentTheme = null;
        
        // 渲染控制台内容
        function renderConsole(themeKey) {
            const theme = themes[themeKey];
            if (!theme) return;
            currentTheme = theme;
            
            terminalRoot.innerHTML = `
                <div class="line" style="color: ${theme.color};">> ${theme.name}</div>
                <div class="line" style="color: ${theme.color};">> 输入任何问题，按回车 → 获得专属${themeKey === 'sci-fi' ? '未来预言' : (themeKey === 'philosophy' ? '哲思回应' : '搞笑答复')}</div>
                <div class="prompt">
                    <span style="color: ${theme.color};">${theme.promptSymbol}</span>
                    <input type="text" id="consoleInput" placeholder="例如：你好" autofocus style="color: ${theme.color}; border-bottom-color: ${theme.color};">
                </div>
                <div class="output" id="consoleOutput" style="border-top-color: ${theme.color};">
                    <p style="color: ${theme.color};">✨ 等待你的第一句话...</p>
                </div>
                <div class="back-btn" style="border-color: ${theme.color}; color: ${theme.color};" id="backToParticlesBtn">↺ 返回星云世界</div>
            `;
            
            // 绑定输入事件
            const input = document.getElementById('consoleInput');
            const outputDiv = document.getElementById('consoleOutput');
            
            function addMessage(question, answer) {
                const qElem = document.createElement('p');
                qElem.style.color = '#aaa';
                qElem.innerHTML = `❯ 你问：${question}`;
                const aElem = document.createElement('p');
                aElem.style.color = theme.color;
                aElem.innerHTML = `◉ ${answer}`;
                outputDiv.appendChild(qElem);
                outputDiv.appendChild(aElem);
                outputDiv.scrollTop = outputDiv.scrollHeight;
                // 限制消息条数
                while (outputDiv.children.length > 16) {
                    outputDiv.removeChild(outputDiv.firstChild);
                }
            }
            
            function getAnswer(question) {
                const lowerQ = question.toLowerCase();
                for (let [key, value] of Object.entries(theme.keywordMap)) {
                    if (lowerQ.includes(key)) return value;
                }
                return theme.answers[Math.floor(Math.random() * theme.answers.length)];
            }
            
            function handleSubmit() {
                const q = input.value.trim();
                if (q === "") return;
                const ans = getAnswer(q);
                addMessage(q, ans);
                input.value = "";
                input.focus();
            }
            
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSubmit();
            });
            
            // 返回按钮
            const backBtn = document.getElementById('backToParticlesBtn');
            backBtn.addEventListener('click', () => {
                consolePanel.classList.remove('active');
                // 恢复交互，重新开始动画
                resumeParticleInteraction();
            });
        }
        
        function openConsole(themeKey) {
            // 让粒子场景暂停动画/减少性能消耗（可选，但保留也可以）
            renderConsole(themeKey);
            consolePanel.classList.add('active');
            // 让粒子交互暂停（不影响视觉，但避免点击穿透）
            pauseParticleInteraction();
        }
        
        // 控制粒子场景的点击穿透 / 相机控制可选
        let particleActive = true;
        function pauseParticleInteraction() {
            particleActive = false;
            // 禁止CSS2D物体的点击（其实不用，因为容器遮罩了）
            labelGroup.forEach(label => {
                label.element.style.pointerEvents = 'none';
            });
        }
        function resumeParticleInteraction() {
            particleActive = true;
            labelGroup.forEach(label => {
                label.element.style.pointerEvents = 'auto';
            });
        }
        
        // ---------- 动画循环：粒子旋转、浮动效果 ----------
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            
            // 光环旋转
            ringPoints.rotation.y = time * 0.5;
            ringPoints.rotation.x = Math.sin(time * 0.3) * 0.2;
            ringPoints.rotation.z = Math.cos(time * 0.2) * 0.1;
            
            // 飘浮粒子整体旋转
            particles.rotation.y = time * 0.1;
            particles.rotation.x = Math.sin(time * 0.2) * 0.1;
            
            // 星星缓慢自转
            stars.rotation.y += 0.0005;
            stars.rotation.x += 0.0003;
            
            // CSS2D文字组微动（产生浮空感）
            labelGroup.forEach((label, idx) => {
                label.position.y += Math.sin(time * 1.5 + idx) * 0.002;
            });
            
            // 相机轻微摆动（增加沉浸感）
            if (particleActive) {
                camera.position.x += (0 - camera.position.x) * 0.02;
                camera.position.y += (0 - camera.position.y) * 0.02;
            } else {
                // 控制台打开时相机不动即可
            }
            camera.lookAt(0, 0, 0);
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        // 窗口适配
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 小彩蛋控制台输出
        console.log('%c✨ 文字粒子风暴已启动 | 点击文字进入多维控制台 ✨', 'color: #0cf; font-size: 14px;');
    </script>
</body>
</html>
