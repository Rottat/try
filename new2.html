<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>星云粒子 · 文字神谕 | 流光重构问答</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            touch-action: none;
            background-color: #030318;
        }
        /* 星空控制台——粒子聚合核心 */
        .oracle-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 88%;
            max-width: 560px;
            background: rgba(3, 8, 28, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(0, 210, 255, 0.7);
            box-shadow: 0 0 45px rgba(0, 180, 255, 0.4);
            padding: 18px 22px;
            z-index: 30;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            opacity: 0;
            visibility: hidden;
            font-family: 'Courier New', monospace;
            pointer-events: none;
        }
        .oracle-panel.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            bottom: 40px;
            transform: translateX(-50%) scale(1);
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid rgba(0, 210, 255, 0.6);
            margin-bottom: 16px;
            padding-bottom: 8px;
            color: #0cf;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #0cf;
        }
        .theme-tag {
            font-size: 14px;
            background: rgba(0,255,200,0.2);
            padding: 4px 14px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }
        .chat-area {
            max-height: 260px;
            overflow-y: auto;
            margin-bottom: 16px;
            padding-right: 6px;
            scrollbar-width: thin;
        }
        .chat-area::-webkit-scrollbar {
            width: 4px;
            background: #111;
        }
        .chat-area p {
            margin: 10px 0;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
        }
        .user-msg {
            color: #b0e0ff;
            border-left: 3px solid #0cf;
            padding-left: 12px;
            opacity: 0.9;
        }
        .ai-msg {
            color: #ffcc88;
            text-shadow: 0 0 4px rgba(255,200,100,0.6);
            border-left: 3px solid #ffaa44;
            padding-left: 12px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 8px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 60px;
            padding: 4px 12px;
            border: 1px solid rgba(0,210,255,0.5);
        }
        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            color: #0cf;
            font-family: monospace;
            font-size: 14px;
            outline: none;
            padding: 10px 5px;
        }
        .input-group input::placeholder {
            color: rgba(0,210,255,0.5);
        }
        .input-group button {
            background: rgba(0,210,255,0.25);
            border: none;
            border-radius: 40px;
            color: #0cf;
            padding: 6px 18px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-group button:active {
            transform: scale(0.96);
            background: rgba(0,210,255,0.7);
            color: white;
        }
        .back-star-btn {
            margin-top: 12px;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,200,0.6);
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 6px;
            transition: 0.2s;
        }
        .back-star-btn:active {
            background: rgba(0,210,255,0.3);
            color: #0cf;
        }
        .instruction-tip {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 6px 14px;
            font-size: 10px;
            color: #ccf;
            pointer-events: none;
            z-index: 25;
            font-family: monospace;
            letter-spacing: 1px;
            border-left: 2px solid #0cf;
        }
        @media (max-width: 600px) {
            .oracle-panel { width: 90%; padding: 14px; bottom: 20px; }
            .chat-area p { font-size: 12px; }
            .input-group button { padding: 4px 12px; }
        }
    </style>
</head>
<body>
    <div class="instruction-tip">
        ✦ 星云粒子文字 | 点击任一炫彩词组 → 冲击波重构 · 粒子问答 ✦
    </div>
    <div id="oraclePanel" class="oracle-panel">
        <div class="panel-header">
            <span>🌌 粒子智识之核 🌌</span>
            <span class="theme-tag" id="themeLabel">SCI-FI</span>
        </div>
        <div class="chat-area" id="chatMessages">
            <p class="ai-msg">✨ 星云粒子聚合完成，等待你的灵魂发问...</p>
        </div>
        <div class="input-group">
            <input type="text" id="questionInput" placeholder="向粒子星云提问...">
            <button id="askBtn">✦ 问询 ✦</button>
        </div>
        <div class="back-star-btn" id="resetNebulaBtn">↺ 重返粒子圣殿 · 重构文字星云</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- 移动端优化与梦幻星云背景 ---
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020214);
        scene.fog = new THREE.FogExp2(0x020214, 0.006);
        
        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 0.6, 14);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: !isMobile });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);
        
        // 后期 bloom 塑造星云感
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.4, 0.75);
        bloomPass.threshold = 0.08;
        bloomPass.strength = isMobile ? 0.85 : 1.05;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // 轨道控制 让视角微微可动
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.autoRotate = false;
        controls.enableZoom = !isMobile;
        controls.enablePan = false;
        controls.rotateSpeed = 0.7;
        controls.zoomSpeed = 0.8;
        controls.target.set(0, 0, 0);
        
        // ------ 华丽星云背景：粒子漩涡 + 飘浮星系核心 ------
        const starfieldGeo = new THREE.BufferGeometry();
        const starCount = isMobile ? 1500 : 2800;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 240;
            starPositions[i*3+1] = (Math.random() - 0.5) * 130;
            starPositions[i*3+2] = (Math.random() - 0.5) * 100 - 50;
        }
        starfieldGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xaaccff, size: isMobile ? 0.09 : 0.13, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending });
        const backgroundStars = new THREE.Points(starfieldGeo, starMat);
        scene.add(backgroundStars);
        
        // 动态彩色星云云团 (大量粒子)
        const nebulaCount = isMobile ? 1800 : 3200;
        const nebulaGeo = new THREE.BufferGeometry();
        const nebulaPos = [];
        const nebulaColors = [];
        for (let i = 0; i < nebulaCount; i++) {
            const radius = 4 + Math.random() * 7;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta) * 0.5;
            const z = radius * Math.cos(phi) * 0.8;
            nebulaPos.push(x, y, z);
            const hue = 0.55 + Math.random() * 0.4;
            const col = new THREE.Color().setHSL(hue, 1.0, 0.5);
            nebulaColors.push(col.r, col.g, col.b);
        }
        nebulaGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(nebulaPos), 3));
        nebulaGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(nebulaColors), 3));
        const nebulaMat = new THREE.PointsMaterial({ size: isMobile ? 0.07 : 0.1, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true });
        const nebulaCloud = new THREE.Points(nebulaGeo, nebulaMat);
        scene.add(nebulaCloud);
        
        // 额外流光粒子环 (装饰)
        const ringParticleCount = isMobile ? 800 : 1400;
        const ringGeo = new THREE.BufferGeometry();
        const ringPositions = [];
        const ringColorList = [];
        for (let i = 0; i < ringParticleCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const r = 2.2 + Math.random() * 2.2;
            const x = Math.cos(angle) * r;
            const z = Math.sin(angle) * r;
            const y = Math.sin(angle * 3) * 0.9;
            ringPositions.push(x, y, z);
            const hueRing = 0.65 + Math.random() * 0.3;
            const colRing = new THREE.Color().setHSL(hueRing, 1.0, 0.6);
            ringColorList.push(colRing.r, colRing.g, colRing.b);
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(ringPositions), 3));
        ringGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(ringColorList), 3));
        const ringPointsMat = new THREE.PointsMaterial({ size: 0.065, vertexColors: true, blending: THREE.AdditiveBlending });
        const ringPointsObj = new THREE.Points(ringGeo, ringPointsMat);
        scene.add(ringPointsObj);
        
        // ---- 文字粒子生成器 (产生色彩粒子文字) ----
        function generateWordParticles(word, baseHue, colorVariety = 0.28, particleSize = 0.12, posOffset = { x: 0, y: 0, z: 0 }) {
            const canvas = document.createElement('canvas');
            canvas.width = 640;
            canvas.height = 280;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            let fontSize = 130;
            if (word.length > 8) fontSize = 100;
            ctx.font = `Bold ${fontSize}px "Segoe UI", "Poppins", "Courier New"`;
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(word, canvas.width/2, canvas.height/2);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const positions = [];
            const colors = [];
            const step = 3;
            for (let y = 0; y < canvas.height; y += step) {
                for (let x = 0; x < canvas.width; x += step) {
                    const idx = (y * canvas.width + x) * 4;
                    if (data[idx] > 200) {
                        const px = (x / canvas.width) * 5.4 - 2.7;
                        const py = (1 - (y / canvas.height)) * 2.6 - 1.3;
                        const pz = (Math.random() - 0.5) * 0.25;
                        positions.push(px + posOffset.x, py + posOffset.y, pz + posOffset.z);
                        const hue = (baseHue + (Math.random() - 0.5) * colorVariety) % 1.0;
                        const color = new THREE.Color().setHSL(hue, 1.0, 0.68);
                        colors.push(color.r, color.g, color.b);
                    }
                }
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
            const material = new THREE.PointsMaterial({ size: particleSize, vertexColors: true, blending: THREE.AdditiveBlending });
            const points = new THREE.Points(geometry, material);
            return { points, positions, colors, count: positions.length / 3 };
        }
        
        // 三大主题文字
        const wordsConfig = [
            { name: 'SCI-FI', hue: 0.55, var: 0.22, offset: { x: -3.5, y: 1.3, z: 0.2 }, size: 0.13 },
            { name: 'PHILOSOPHY', hue: 0.82, var: 0.28, offset: { x: 0, y: -0.9, z: 0.4 }, size: 0.12 },
            { name: 'FUNNY', hue: 0.12, var: 0.22, offset: { x: 3.3, y: 1.1, z: 0.1 }, size: 0.13 }
        ];
        
        const wordParticleGroups = [];
        let allParticleData = [];   // 存储所有粒子物体及初始数据
        
        // 创建文字并储存初始位置（用于重置归位）
        wordsConfig.forEach((cfg, idx) => {
            const { points, positions, colors, count } = generateWordParticles(cfg.name, cfg.hue, cfg.var, cfg.size, cfg.offset);
            scene.add(points);
            wordParticleGroups.push({ points, name: cfg.name, offset: cfg.offset, initialPos: positions.slice(), initialColors: colors, count, idx });
            allParticleData.push({
                obj: points,
                initialPositions: positions.slice(),
                dynamicPositions: points.geometry.attributes.position.array,
                colorAttr: points.geometry.attributes.color.array,
                count: count,
                velocities: null
            });
        });
        
        // 将星环粒子也加入冲击波动态库
        allParticleData.push({
            obj: ringPointsObj,
            initialPositions: ringPositions.slice(),
            dynamicPositions: ringPointsObj.geometry.attributes.position.array,
            colorAttr: ringPointsObj.geometry.attributes.color.array,
            count: ringParticleCount,
            velocities: null
        });
        allParticleData.push({
            obj: nebulaCloud,
            initialPositions: nebulaPos.slice(),
            dynamicPositions: nebulaCloud.geometry.attributes.position.array,
            colorAttr: nebulaCloud.geometry.attributes.color.array,
            count: nebulaCount,
            velocities: null
        });
        
        // 缓存原始位置用于重置
        for (let p of allParticleData) {
            p.savedOrig = p.initialPositions.slice();
        }
        
        // ---- 冲击波 & 粒子重构问答动画 ----
        let shockwaveActive = false;
        let isQAMode = false;
        let activeThemeName = '';
        let activeThemeIdx = -1;
        let shockwaveTimer = null;
        
        // 冲击波搅乱 + 重构为环绕星云 (粒子组合动画)
        function triggerShockwaveAndReconstruct(themeName, themeIdx) {
            if (shockwaveActive) return;
            shockwaveActive = true;
            activeThemeName = themeName;
            activeThemeIdx = themeIdx;
            
            // 隐藏原始文字粒子对象 (暂时隐藏)
            wordParticleGroups.forEach(grp => { grp.points.visible = false; });
            
            // 为所有粒子生成向外爆炸速度 + 涡旋
            for (let p of allParticleData) {
                const positions = p.dynamicPositions;
                const count = p.count;
                if (!p.velocities) p.velocities = new Array(count * 3).fill(0);
                const center = { x: 0, y: 0, z: 0 };
                for (let i = 0; i < count; i++) {
                    const ix = i * 3;
                    const px = positions[ix];
                    const py = positions[ix+1];
                    const pz = positions[ix+2];
                    let dx = px - center.x;
                    let dy = py - center.y;
                    let dz = pz - center.z;
                    let len = Math.hypot(dx, dy, dz) + 0.25;
                    let force = 1.5 / (len * 0.4 + 0.3);
                    force = Math.min(force, 2.0);
                    p.velocities[ix] = (dx / len) * force * (0.7 + Math.random() * 1.0);
                    p.velocities[ix+1] = (dy / len) * force * (0.7 + Math.random() * 0.9);
                    p.velocities[ix+2] = (dz / len) * force * (0.7 + Math.random() * 0.9);
                    // 添加随机旋转分量
                    p.velocities[ix] += (Math.random() - 0.5) * 0.8;
                    p.velocities[ix+1] += (Math.random() - 0.5) * 0.6;
                    p.velocities[ix+2] += (Math.random() - 0.5) * 0.8;
                }
            }
            
            // 600ms后粒子重构为美丽的螺旋星云 (组合动画)
            setTimeout(() => {
                if (!shockwaveActive) return;
                // 重构所有粒子位置：形成三层螺旋光环围绕控制台区域
                for (let p of allParticleData) {
                    const positions = p.dynamicPositions;
                    const count = p.count;
                    for (let i = 0; i < count; i++) {
                        const angle = (i / count) * Math.PI * 8;
                        const radius = 2.2 + Math.sin(angle * 1.5) * 1.2;
                        const yOff = Math.sin(angle * 2) * 1.1;
                        const xPos = Math.cos(angle) * radius;
                        const zPos = Math.sin(angle) * radius;
                        const yPos = yOff + Math.cos(angle * 1.7) * 0.6;
                        positions[i*3] = xPos;
                        positions[i*3+1] = yPos;
                        positions[i*3+2] = zPos;
                    }
                    p.obj.geometry.attributes.position.needsUpdate = true;
                    p.velocities = null;
                }
                // 激活问答模式UI，粒子组合完成
                isQAMode = true;
                const panel = document.getElementById('oraclePanel');
                document.getElementById('themeLabel').innerText = activeThemeName;
                panel.classList.add('active');
                const chatDiv = document.getElementById('chatMessages');
                chatDiv.innerHTML = '';
                const themeLib = getThemeKnowledge(activeThemeName);
                addAIMessage(themeLib.greeting);
                shockwaveActive = false;
            }, 680);
        }
        
        function getThemeKnowledge(theme) {
            const db = {
                'SCI-FI': { greeting: '⚡ 超星粒子流已链接，未来预言池沸腾... 提出你的深空疑问，粒子将重组答案。', answers: ["🛸 星舰AI: 未来三日内你将获得关键灵感。", "🤖 仿生粒子: 你的创造力即将突破奇点。", "🌌 量子回响: 勇敢提问，星云会回馈奇迹。", "💫 时空管理者: 你接下来的选择将撼动平行宇宙。"], keywordMap: { "未来": "🔮 时间粒子显示: 12个月内你会踏上星尘之旅。", "科技": "💻 你的思维正在升级，尝试构建新的数字宇宙。", "宇宙": "🌠 渺小与浩瀚同源，你即星尘。" } },
                'PHILOSOPHY': { greeting: "📜 星云哲思粒子环绕，你的疑问将点亮智慧星环。", answers: ["🌿 庄子低语: 此刻追问即是答案的本体。", "🧘 尼采回响: 深渊与星辰都在你内心。", "💎 柏拉图光晕: 真实即将浮出水面。", "🌀 老子云: 道法自然，如星云流转。"], keywordMap: { "意义": "意义是你亲手编绘的星图。", "幸福": "幸福闪烁在觉知的每个刹那。", "死亡": "死亡让星尘粒子更显珍贵。" } },
                'FUNNY': { greeting: "😂 滑稽星云粒子抖动成段子... 快问快答，笑果拉满！", answers: ["🐣 为什么粒子不吵架？因为它们是波粒二象性的朋友！", "🍕 你体内的快乐粒子超标，建议立刻大笑。", "🤣 老板说再改一版？星云粒子说: 关机！", "🎈 好消息: 宇宙限量版就是你。"], keywordMap: { "工作": "💼 工作像星云，远看绚烂，近看都是代码。", "钱": "💰 粒子变不出钞票，但能变出笑声。", "爱情": "💕 两颗星的引力，无法计算但很浪漫。" } }
            };
            return db[theme] || db['SCI-FI'];
        }
        
        function getAnswerByTheme(theme, question) {
            const data = getThemeKnowledge(theme);
            const lowerQ = question.toLowerCase();
            for (let [key, val] of Object.entries(data.keywordMap)) {
                if (lowerQ.includes(key)) return val;
            }
            return data.answers[Math.floor(Math.random() * data.answers.length)];
        }
        
        // 回答时增加粒子爆发组合特效（粒子流汇聚到控制台）
        function particleAnswerFlash() {
            if (!isQAMode) return;
            for (let i = 0; i < 60; i++) {
                const particleFlash = new THREE.Points(
                    new THREE.BufferGeometry(),
                    new THREE.PointsMaterial({ color: 0xffaa66, size: 0.08, blending: THREE.AdditiveBlending })
                );
                const positions = new Float32Array(3);
                const radius = 2.2;
                const ang = Math.random() * Math.PI * 2;
                positions[0] = Math.cos(ang) * radius;
                positions[1] = Math.sin(ang) * 1.2;
                positions[2] = Math.sin(ang) * radius;
                particleFlash.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                scene.add(particleFlash);
                setTimeout(() => scene.remove(particleFlash), 300);
            }
            // 同时让星环粒子颜色闪烁
            ringPointsMat.color.setHex(0xffaa88);
            setTimeout(() => { ringPointsMat.color.setHex(0x88aaff); }, 200);
        }
        
        function addUserMessage(msg) {
            const chatDiv = document.getElementById('chatMessages');
            const p = document.createElement('p');
            p.className = 'user-msg';
            p.innerHTML = `❯ 你：${msg}`;
            chatDiv.appendChild(p);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
        
        function addAIMessage(msg) {
            const chatDiv = document.getElementById('chatMessages');
            const p = document.createElement('p');
            p.className = 'ai-msg';
            p.innerHTML = `◉ 星云粒子：${msg}`;
            chatDiv.appendChild(p);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            particleAnswerFlash(); // 每次回答粒子组合流光特效
        }
        
        // 重置所有并返回粒子文字形态（组合归位动画）
        function resetToWordNebula() {
            if (shockwaveActive) return;
            isQAMode = false;
            document.getElementById('oraclePanel').classList.remove('active');
            // 恢复文字粒子可见
            wordParticleGroups.forEach(grp => { grp.points.visible = true; });
            // 将所有粒子位置归位到原始位置 (文字粒子+星云环)
            for (let p of allParticleData) {
                const originalPos = p.savedOrig;
                const positionsAttr = p.dynamicPositions;
                for (let i = 0; i < p.count; i++) {
                    positionsAttr[i*3] = originalPos[i*3];
                    positionsAttr[i*3+1] = originalPos[i*3+1];
                    positionsAttr[i*3+2] = originalPos[i*3+2];
                }
                p.obj.geometry.attributes.position.needsUpdate = true;
            }
            // 额外重新把文字粒子组的颜色恢复原本（可选）
            shockwaveActive = false;
        }
        
        // ---- 点击检测 (射线检测文字区域) ----
        const raycaster = new THREE.Raycaster();
        const hitBoxes = [];
        wordsConfig.forEach((cfg, idx) => {
            const boxGeo = new THREE.BoxGeometry(2.9, 1.6, 1.0);
            const boxMat = new THREE.MeshBasicMaterial({ visible: false });
            const boxMesh = new THREE.Mesh(boxGeo, boxMat);
            boxMesh.position.set(cfg.offset.x, cfg.offset.y, cfg.offset.z);
            scene.add(boxMesh);
            hitBoxes.push({ mesh: boxMesh, idx, name: cfg.name });
        });
        
        function onCanvasClick(event) {
            if (shockwaveActive || isQAMode) return;
            const mouse = new THREE.Vector2();
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            mouse.set(x, y);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(hitBoxes.map(b => b.mesh));
            if (intersects.length) {
                const hit = hitBoxes.find(b => b.mesh === intersects[0].object);
                if (hit) triggerShockwaveAndReconstruct(hit.name, hit.idx);
            }
        }
        
        window.addEventListener('click', onCanvasClick);
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length) {
                const touch = e.touches[0];
                const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
                onCanvasClick(fakeEvent);
            }
            e.preventDefault();
        }, { passive: false });
        
        // UI 交互
        document.getElementById('askBtn').addEventListener('click', () => {
            if (!isQAMode) return;
            const input = document.getElementById('questionInput');
            const q = input.value.trim();
            if (!q) return;
            addUserMessage(q);
            const ans = getAnswerByTheme(activeThemeName, q);
            addAIMessage(ans);
            input.value = '';
        });
        document.getElementById('questionInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('askBtn').click(); });
        document.getElementById('resetNebulaBtn').addEventListener('click', resetToWordNebula);
        
        // ---- 初始动画：粒子散落聚合 (星云散落感) ----
        function initScatterAnimation() {
            // 一开始让所有文字粒子随机偏离位置
            for (let p of allParticleData) {
                const posAttr = p.dynamicPositions;
                for (let i = 0; i < p.count; i++) {
                    posAttr[i*3] += (Math.random() - 0.5) * 3.0;
                    posAttr[i*3+1] += (Math.random() - 0.5) * 2.5;
                    posAttr[i*3+2] += (Math.random() - 0.5) * 2.0;
                }
                p.obj.geometry.attributes.position.needsUpdate = true;
            }
            // 1.2 秒后优雅回归
            setTimeout(() => {
                for (let p of allParticleData) {
                    const orig = p.savedOrig;
                    const posAttr = p.dynamicPositions;
                    for (let i = 0; i < p.count; i++) {
                        posAttr[i*3] = orig[i*3];
                        posAttr[i*3+1] = orig[i*3+1];
                        posAttr[i*3+2] = orig[i*3+2];
                    }
                    p.obj.geometry.attributes.position.needsUpdate = true;
                }
            }, 1200);
        }
        initScatterAnimation();
        
        // 动画旋转 星云背景优雅转动
        let time = 0;
        function animateBackground() {
            requestAnimationFrame(animateBackground);
            time += 0.008;
            backgroundStars.rotation.y += 0.0008;
            nebulaCloud.rotation.y += 0.0006;
            nebulaCloud.rotation.x = Math.sin(time * 0.2) * 0.1;
            ringPointsObj.rotation.z = Math.sin(time * 0.5) * 0.1;
            if (!isQAMode && !shockwaveActive) {
                ringPointsObj.rotation.y += 0.005;
            } else if (isQAMode) {
                ringPointsObj.rotation.y += 0.01;
                ringPointsObj.rotation.x = Math.sin(time) * 0.1;
            }
            controls.update();
            effectComposer.render();
        }
        animateBackground();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('%c🌠 星云粒子圣殿 | 文字由星尘构成 · 轻触开启冲击波重构问答 🌠', 'color: #0cf; font-size: 14px;');
    </script>
</body>
</html>
