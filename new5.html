<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>星云创造者 · 神权纪元 | 双折叠面板</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            background-color: #020210;
            touch-action: pan-x pan-y;
        }
        /* 通用折叠面板样式 */
        .foldable-panel {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(6, 12, 32, 0.92);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(0, 210, 255, 0.7);
            box-shadow: 0 0 40px rgba(0, 160, 255, 0.4);
            z-index: 40;
            font-family: monospace;
            color: #eef;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            pointer-events: auto;
            overflow: hidden;
            border-radius: 48px;
            width: 92%;
            max-width: 720px;
        }
        /* 顶部星团管理面板 */
        .top-panel {
            top: 70px;
        }
        /* 底部神权面板 */
        .bottom-panel {
            bottom: 25px;
        }
        /* 折叠状态 */
        .foldable-panel.collapsed {
            width: auto;
            max-width: 280px;
            background: rgba(6, 12, 32, 0.92);
            border-radius: 60px;
            cursor: pointer;
        }
        .foldable-panel.collapsed .panel-content {
            display: none;
        }
        .foldable-panel.collapsed .panel-header-bar {
            padding: 10px 20px;
            border-bottom: none;
            justify-content: center;
        }
        .panel-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(0,200,255,0.3);
            transition: 0.2s;
        }
        .panel-header-bar:hover {
            background: rgba(0,200,255,0.1);
        }
        .collapse-icon {
            font-size: 18px;
            font-weight: bold;
            background: rgba(0,0,0,0.4);
            border-radius: 30px;
            padding: 0 8px;
            transition: 0.2s;
        }
        .panel-content {
            padding: 16px 20px;
            transition: 0.2s;
        }
        /* 资源栏 */
        .resource-bar {
            display: flex;
            justify-content: space-between;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0,200,255,0.4);
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: bold;
            flex-wrap: wrap;
            gap: 8px;
        }
        .resource {
            background: rgba(0,0,0,0.6);
            padding: 4px 14px;
            border-radius: 40px;
            letter-spacing: 1px;
        }
        .resource span {
            color: #ffdd88;
            font-size: 20px;
        }
        /* 技能栏 */
        .skill-bar {
            display: flex;
            gap: 12px;
            margin: 8px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        .skill-btn {
            background: rgba(30,40,70,0.9);
            border: 1px solid rgba(0,210,255,0.5);
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 12px;
            color: #ccf;
            cursor: pointer;
            transition: 0.2s;
        }
        .skill-btn:active { transform: scale(0.95); background: #2a6f8f; }
        /* 星团列表区域 */
        .cluster-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 11px;
            max-height: 90px;
            overflow-y: auto;
            padding: 4px 0;
        }
        .cluster-badge {
            background: rgba(20,30,55,0.8);
            border-radius: 30px;
            padding: 4px 12px;
            border-left: 3px solid;
            cursor: pointer;
            transition: 0.1s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .cluster-badge.selected {
            background: rgba(0,180,255,0.5);
            box-shadow: 0 0 8px #0cf;
        }
        .action-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 12px 0 8px;
        }
        .god-btn {
            background: rgba(20, 30, 55, 0.9);
            border: 1px solid rgba(0, 210, 255, 0.7);
            border-radius: 60px;
            padding: 8px 20px;
            font-family: monospace;
            font-weight: bold;
            font-size: 13px;
            color: #0cf;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        .god-btn:active { transform: scale(0.96); background: rgba(0, 200, 255, 0.5); color: white; }
        /* 可折叠编年史面板 - 右上角独立 */
        .chronicle-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 280px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border-left: 3px solid #0cf;
            z-index: 45;
            pointer-events: auto;
            transition: all 0.3s ease;
            overflow: hidden;
            font-family: monospace;
        }
        .chronicle-container.collapsed {
            width: auto;
            max-width: 240px;
            border-radius: 40px;
            background: rgba(0,0,0,0.75);
        }
        .chronicle-container.collapsed .chronicle-content {
            display: none;
        }
        .chronicle-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px;
            cursor: pointer;
            font-weight: bold;
            color: #0cf;
            border-bottom: 1px solid rgba(0,200,255,0.4);
        }
        .chronicle-header span:first-child {
            font-size: 12px;
            letter-spacing: 1px;
        }
        .chronicle-toggle {
            font-size: 14px;
            background: rgba(0,0,0,0.4);
            border-radius: 30px;
            padding: 0 8px;
        }
        .chronicle-content {
            max-height: 280px;
            overflow-y: auto;
            padding: 8px;
            font-size: 10px;
            color: #ffd9aa;
        }
        .chronicle-log {
            line-height: 1.4;
        }
        .chronicle-log div {
            margin: 6px 0;
            border-left: 2px solid #0cf6;
            padding-left: 8px;
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            padding: 5px 12px;
            font-size: 10px;
            color: #ccf;
            pointer-events: none;
            z-index: 45;
        }
        .tip-highlight {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 6px 18px;
            border-radius: 40px;
            color: #ffdd99;
            font-size: 12px;
            pointer-events: none;
            z-index: 50;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .tip-highlight.show { opacity: 1; }
        @media (max-width: 600px) {
            .foldable-panel { width: 95%; }
            .top-panel { top: 60px; }
            .bottom-panel { bottom: 12px; }
            .chronicle-container { width: 240px; top: 12px; right: 12px; }
            .chronicle-container.collapsed { width: auto; max-width: 200px; }
            .god-btn { padding: 5px 12px; font-size: 11px; }
            .panel-header-bar { padding: 8px 16px; }
            .chronicle-header { padding: 6px 12px; }
            .chronicle-content { max-height: 200px; }
        }
        #transitionCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 60; }
    </style>
</head>
<body>
    <div class="instruction">✨ 星落管理（顶部） · 神权力量（底部） | 拖拽星团移动 | Ctrl+点击多选 ✨</div>
    <div class="tip-highlight" id="godTip">✨ 星云神谕 ✨</div>

    <!-- 可折叠星云编年史 -->
    <div class="chronicle-container" id="chronicleContainer">
        <div class="chronicle-header" id="chronicleHeader">
            <span>📜 星云编年史</span>
            <span class="chronicle-toggle" id="chronicleToggle">▼</span>
        </div>
        <div class="chronicle-content" id="chronicleContent">
            <div class="chronicle-log" id="chronicleLog"></div>
        </div>
    </div>

    <!-- 顶部折叠面板：星落管理与议会 -->
    <div class="foldable-panel top-panel" id="clustersPanel">
        <div class="panel-header-bar" id="clustersHeader">
            <span>🌟 星落议会 · 星团管理</span>
            <span class="collapse-icon" id="clustersCollapseIcon">▼</span>
        </div>
        <div class="panel-content" id="clustersPanelContent">
            <div class="cluster-stats" id="clusterListPanel"></div>
            <div class="action-grid">
                <button class="god-btn" id="createBtn">🌟 创造新星团</button>
                <button class="god-btn" id="breedBtn">🌱 繁育 (+)</button>
                <button class="god-btn" id="collapseBtn">🌀 坍缩 (-)</button>
                <button class="god-btn" id="deleteSelectedBtn">💀 湮灭选中</button>
            </div>
            <div class="event-log" id="eventLogTop" style="font-size:10px; text-align:center; color:#aaa;">✨ 点击星团选中 | 拖拽移动 | Ctrl多选</div>
        </div>
    </div>

    <!-- 底部折叠面板：神权力量 -->
    <div class="foldable-panel bottom-panel" id="godPanel">
        <div class="panel-header-bar" id="godHeader">
            <span>⚡ 神权圣坛 · 释放神祇之力</span>
            <span class="collapse-icon" id="godCollapseIcon">▼</span>
        </div>
        <div class="panel-content" id="godPanelContent">
            <div class="resource-bar">
                <div class="resource">🌌 星尘能量: <span id="dustAmount">100</span></div>
                <div class="resource">✨ 星团总数: <span id="clusterCount">0</span></div>
                <div class="resource">⚡ 神权冷却: <span id="skillCooldown">就绪</span></div>
            </div>
            <div class="skill-bar">
                <button class="skill-btn" id="skillRain">🌧️ 星尘雨 (30)</button>
                <button class="skill-btn" id="skillStasis">⏳ 时空停滞 (25)</button>
                <button class="skill-btn" id="skillMigrate">🌀 迁徙 (15)</button>
            </div>
            <div class="event-log" id="eventLogBottom" style="font-size:10px; margin-top:8px; text-align:center;">✨ 神权技能影响所有星团 / 迁徙需选中星团</div>
        </div>
    </div>

    <canvas id="transitionCanvas"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ---------- 初始化 ----------
        const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020115);
        scene.fog = new THREE.FogExp2(0x020115, 0.004);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 3.2, 18);
        const renderer = new THREE.WebGLRenderer({ antialias: !isMobile });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.35, 0.7);
        bloomPass.strength = isMobile ? 0.8 : 1.0;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.06;
        controls.enableZoom = true; controls.enablePan = true;
        controls.zoomSpeed = 0.8; controls.rotateSpeed = 0.7;
        controls.target.set(0, 0, 0);
        
        // 背景星群
        const starBgGeo = new THREE.BufferGeometry();
        const starCount = isMobile ? 1200 : 2200;
        const starPositions = [];
        for (let i = 0; i < starCount; i++) starPositions.push((Math.random() - 0.5)*260, (Math.random()-0.5)*140, (Math.random()-0.5)*110-50);
        starBgGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPositions), 3));
        const bgStars = new THREE.Points(starBgGeo, new THREE.PointsMaterial({ color: 0xaaccff, size: isMobile?0.07:0.1, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending }));
        scene.add(bgStars);
        const mistGeo = new THREE.BufferGeometry();
        const mistPos = [];
        for (let i=0;i<1000;i++) mistPos.push((Math.random()-0.5)*20, (Math.random()-0.5)*14, (Math.random()-0.5)*20-8);
        mistGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(mistPos),3));
        scene.add(new THREE.Points(mistGeo, new THREE.PointsMaterial({ color:0x88aaff, size:0.04, transparent:true, opacity:0.2, blending:THREE.AdditiveBlending })));
        
        // ---------- 全局事件 & 数据 ----------
        let clusters = [];
        let selectedClusterIds = new Set();
        let starDustEnergy = 150;
        let globalStasisActive = false;
        let stasisEndTime = 0;
        const MIN_POP = 6, MAX_POP = 130;
        let lastEncounterTime = performance.now();
        
        // 编年史 - 折叠控制
        const chronicleContainer = document.getElementById('chronicleContainer');
        const chronicleToggle = document.getElementById('chronicleToggle');
        const chronicleHeader = document.getElementById('chronicleHeader');
        function toggleChronicle() {
            chronicleContainer.classList.toggle('collapsed');
            chronicleToggle.textContent = chronicleContainer.classList.contains('collapsed') ? '▲' : '▼';
        }
        chronicleHeader.addEventListener('click', toggleChronicle);
        if(isMobile) {
            chronicleContainer.classList.add('collapsed');
            chronicleToggle.textContent = '▲';
        }
        
        // 编年史记录
        const chronicleLogDiv = document.getElementById('chronicleLog');
        function addChronicle(msg, type = 'info') {
            const div = document.createElement('div');
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            div.style.color = type === 'war' ? '#ff8888' : (type === 'coop' ? '#88ccff' : '#ffd9aa');
            chronicleLogDiv.appendChild(div);
            while(chronicleLogDiv.children.length > 45) chronicleLogDiv.removeChild(chronicleLogDiv.firstChild);
            chronicleLogDiv.scrollTop = chronicleLogDiv.scrollHeight;
        }
        
        function addEventLog(msg, color = "#ffd9a0", target = "bottom") {
            const eventDiv = target === "top" ? document.getElementById('eventLogTop') : document.getElementById('eventLogBottom');
            const p = document.createElement('div');
            p.style.color = color; p.innerHTML = `✨ ${msg}`;
            eventDiv.appendChild(p);
            while(eventDiv.children.length > 5) eventDiv.removeChild(eventDiv.firstChild);
            eventDiv.scrollTop = eventDiv.scrollHeight;
            const tip = document.getElementById('godTip');
            tip.textContent = msg.length>48?msg.slice(0,45)+"...":msg;
            tip.classList.add('show');
            setTimeout(()=>tip.classList.remove('show'),1800);
            addChronicle(msg, color.includes('ff8888')?'war':(color.includes('88ccff')?'coop':'info'));
        }
        
        function updateUI() {
            document.getElementById('dustAmount').innerText = Math.floor(starDustEnergy);
            document.getElementById('clusterCount').innerText = clusters.length;
            const cdSpan = document.getElementById('skillCooldown');
            if(globalStasisActive) cdSpan.innerText = `停滞中 ${Math.max(0,Math.ceil((stasisEndTime-Date.now())/1000))}s`;
            else cdSpan.innerText = '就绪';
        }
        
        // 星团类 (优化粒子性能)
        class StarCluster {
            constructor(id, name, pos, baseHue, initialPop, colorHex, aggressiveness = 0.5) {
                this.id = id;
                this.name = name;
                this.position = pos.clone();
                this.baseHue = baseHue;
                this.population = Math.min(MAX_POP, Math.max(MIN_POP, initialPop));
                this.colorHex = colorHex;
                this.aggressiveness = aggressiveness;
                this.leaderActive = false;
                this.particles = [];
                this.pointsObj = null;
                this.labelObj = null;
                this.labelElement = null;
                this.interactMesh = null;
                this.initParticles();
                this.createLabel();
                this.createInteractSphere();
                this.createPointsMesh();
            }
            
            getParticleCount() { return Math.floor(24 + (this.population / MAX_POP) * 160); }
            
            initParticles() {
                const target = this.getParticleCount();
                this.particles = [];
                for (let i=0; i<target; i++) {
                    const rad = 0.5 + Math.random()*1.4;
                    const ang1 = Math.random()*Math.PI*2;
                    const ang2 = Math.acos(2*Math.random()-1);
                    let x = this.position.x + rad*Math.sin(ang2)*Math.cos(ang1);
                    let y = this.position.y + rad*Math.sin(ang2)*Math.sin(ang1)*0.7;
                    let z = this.position.z + rad*Math.cos(ang2)*0.9;
                    const vel = new THREE.Vector3((Math.random()-0.5)*0.12, (Math.random()-0.5)*0.12, (Math.random()-0.5)*0.12);
                    const health = this.population/MAX_POP;
                    const sat = 0.7 + health*0.3;
                    const light = 0.5 + health*0.4;
                    const col = new THREE.Color().setHSL(this.baseHue + (Math.random()-0.5)*0.16, sat, light);
                    this.particles.push({ pos:new THREE.Vector3(x,y,z), vel, color:col });
                }
            }
            
            createPointsMesh() {
                const geom = new THREE.BufferGeometry();
                this.pointsObj = new THREE.Points(geom, new THREE.PointsMaterial({ size:0.075, vertexColors:true, blending:THREE.AdditiveBlending }));
                scene.add(this.pointsObj);
                this.updateGeometry();
            }
            
            updateGeometry() {
                const positions = [];
                const colors = [];
                for(let p of this.particles) {
                    positions.push(p.pos.x, p.pos.y, p.pos.z);
                    colors.push(p.color.r, p.color.g, p.color.b);
                }
                const geom = this.pointsObj.geometry;
                if(geom.attributes.position) geom.attributes.position.array = new Float32Array(positions);
                else geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
                if(geom.attributes.color) geom.attributes.color.array = new Float32Array(colors);
                else geom.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
                geom.attributes.position.needsUpdate = true;
                geom.attributes.color.needsUpdate = true;
            }
            
            updateParticlesMotion(deltaTime, isStopped = false) {
                if(isStopped) return;
                for(let p of this.particles) {
                    const toCenter = new THREE.Vector3().subVectors(this.position, p.pos);
                    const force = toCenter.multiplyScalar(0.006);
                    p.vel.x += (Math.random()-0.5)*0.03 + force.x;
                    p.vel.y += (Math.random()-0.5)*0.03 + force.y;
                    p.vel.z += (Math.random()-0.5)*0.03 + force.z;
                    p.vel.clampLength(0,0.1);
                    p.pos.x += p.vel.x * deltaTime * 18;
                    p.pos.y += p.vel.y * deltaTime * 18;
                    p.pos.z += p.vel.z * deltaTime * 18;
                    let offset = p.pos.clone().sub(this.position);
                    let len = offset.length();
                    if(len > 1.9) offset.multiplyScalar(1.9/len);
                    p.pos.copy(this.position.clone().add(offset));
                }
                if(Math.abs(this.particles.length - this.getParticleCount()) > 10) {
                    this.initParticles();
                    this.updateGeometry();
                } else this.updateGeometry();
            }
            
            createLabel() {
                const div = document.createElement('div');
                div.style.cssText = `background:rgba(0,0,0,0.7); backdrop-filter:blur(6px); padding:3px 10px; border-radius:30px; border-left:3px solid ${this.colorHex}; color:${this.colorHex}; font-family:monospace; font-weight:bold; font-size:${isMobile?'10px':'12px'}; white-space:nowrap; pointer-events:none; opacity:0.5; transition:0.2s;`;
                div.innerHTML = `<span>🌟 ${this.name}</span><br><span>🧬 ${this.population}${this.leaderActive?' 👑':''}</span>`;
                this.labelObj = new CSS2DObject(div);
                this.labelElement = div;
                this.labelObj.position.copy(this.position);
                scene.add(this.labelObj);
            }
            
            createInteractSphere() {
                const geom = new THREE.SphereGeometry(1.3, 12, 12);
                const mat = new THREE.MeshBasicMaterial({ visible: false });
                this.interactMesh = new THREE.Mesh(geom, mat);
                this.interactMesh.position.copy(this.position);
                this.interactMesh.userData = { clusterId: this.id };
                scene.add(this.interactMesh);
            }
            
            updateLabel() {
                if(this.labelElement) this.labelElement.innerHTML = `<span>🌟 ${this.name}</span><br><span>🧬 ${this.population}${this.leaderActive?' 👑':''}</span>`;
            }
            
            setPopulation(newPop) {
                let old = this.population;
                this.population = Math.min(MAX_POP, Math.max(MIN_POP, newPop));
                if(old !== this.population) {
                    this.updateLabel();
                    if(this.population > 85 && !this.leaderActive) this.activateLeader();
                    else if(this.population <= 50 && this.leaderActive) this.deactivateLeader();
                }
            }
            addPopulation(delta) { this.setPopulation(this.population + delta); }
            activateLeader() { this.leaderActive = true; this.updateLabel(); addEventLog(`👑 星团「${this.name}」诞生星灵领袖！`, "#ffaa88", "top"); }
            deactivateLeader() { this.leaderActive = false; this.updateLabel(); }
            
            update(deltaTime) { this.updateParticlesMotion(deltaTime, globalStasisActive); }
            destroy() { if(this.pointsObj) scene.remove(this.pointsObj); if(this.labelObj) scene.remove(this.labelObj); if(this.interactMesh) scene.remove(this.interactMesh); }
        }
        
        function setLabelOpacity(cluster, opacity) { if(cluster?.labelElement) cluster.labelElement.style.opacity = opacity; }
        function highlightSelected() { clusters.forEach(c => setLabelOpacity(c, selectedClusterIds.has(c.id) ? 1.0 : 0.5)); }
        
        const prefixes = ["星尘","幻光","暗语","绯炎","霜月","星环","曦和","幽荧","荧惑","天枢"];
        const suffixes = ["之种","星落","云巢","圣殿","渊薮","花园","回廊","方舟","摇篮","歌剧院"];
        function genName() { return prefixes[Math.floor(Math.random()*prefixes.length)] + suffixes[Math.floor(Math.random()*suffixes.length)]; }
        
        function createClusterAtPosition(pos) {
            if(starDustEnergy < 18) { addEventLog("星尘不足 (需要18)", "#ff9988", "top"); return false; }
            const hue = Math.random()*0.7;
            const colorHex = new THREE.Color().setHSL(hue,1,0.6).getStyle();
            const newId = clusters.length;
            const newCluster = new StarCluster(newId, genName(), pos, hue, 16+Math.floor(Math.random()*20), colorHex, 0.3+Math.random()*0.7);
            clusters.push(newCluster);
            starDustEnergy -= 18;
            updateUI(); addEventLog(`🌟 创造星团「${newCluster.name}」`, "#aaffdd", "top"); renderClusterList();
            return true;
        }
        
        function deleteCluster(cluster) {
            const idx = clusters.findIndex(c=>c.id===cluster.id);
            if(idx!==-1) { cluster.destroy(); clusters.splice(idx,1); selectedClusterIds.delete(cluster.id); renderClusterList(); updateUI(); }
        }
        
        function renderClusterList() {
            const container = document.getElementById('clusterListPanel');
            container.innerHTML = '';
            clusters.forEach(c => {
                const badge = document.createElement('div');
                badge.className = 'cluster-badge';
                if(selectedClusterIds.has(c.id)) badge.classList.add('selected');
                badge.style.borderLeftColor = c.colorHex;
                badge.innerHTML = `${c.name} 🧬${c.population}${c.leaderActive?'👑':''}`;
                badge.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(e.ctrlKey || e.metaKey) {
                        if(selectedClusterIds.has(c.id)) selectedClusterIds.delete(c.id);
                        else selectedClusterIds.add(c.id);
                    } else { selectedClusterIds.clear(); selectedClusterIds.add(c.id); }
                    highlightSelected(); renderClusterList();
                    addEventLog(`${selectedClusterIds.size}个星团被选中`, "#aaccff", "top");
                });
                container.appendChild(badge);
            });
        }
        
        function getSelectedClusters() { return clusters.filter(c=>selectedClusterIds.has(c.id)); }
        
        // 管理操作（繁育/坍缩/湮灭）
        function actionBreed() {
            const selected = getSelectedClusters();
            if(selected.length===0) { addEventLog("未选中任何星团", "#ffaa88", "top"); return; }
            let cost = 12 * selected.length;
            if(starDustEnergy < cost) { addEventLog("星尘不足", "#ff9988", "top"); return; }
            let totalGain = 0;
            for(let c of selected) { let gain = Math.floor(Math.random()*14)+8; let newPop = c.population+gain; if(newPop>MAX_POP) newPop=MAX_POP; totalGain += (newPop - c.population); c.setPopulation(newPop); }
            starDustEnergy -= cost;
            addEventLog(`🌱 繁育 +${totalGain}`, "#88ffaa", "top");
            updateUI(); renderClusterList(); selected.forEach(c=>triggerGlow(c.position,0x88ffaa));
        }
        function actionCollapse() {
            const selected = getSelectedClusters();
            if(selected.length===0) return;
            let totalLoss = 0, dustGain = 0;
            for(let c of selected) {
                let loss = Math.floor(Math.random()*12)+5;
                let newPop = c.population - loss; if(newPop<MIN_POP) newPop=MIN_POP;
                totalLoss += (c.population - newPop); dustGain += Math.floor(loss*0.8);
                c.setPopulation(newPop);
            }
            starDustEnergy += dustGain;
            addEventLog(`🌀 坍缩 -${totalLoss}，回收 ${dustGain} 星尘`, "#ffaa88", "top");
            updateUI(); renderClusterList(); selected.forEach(c=>triggerGlow(c.position,0xff8866));
        }
        function deleteSelected() { getSelectedClusters().forEach(c=>deleteCluster(c)); renderClusterList(); updateUI(); }
        
        // 神权技能 (底部面板)
        function skillRain() {
            if(starDustEnergy < 30) { addEventLog("星尘不足 (30)", "#ff9988", "bottom"); return; }
            starDustEnergy -= 30;
            for(let c of clusters) { let gain = Math.floor(Math.random()*12)+4; c.addPopulation(gain); }
            addEventLog("🌧️ 星尘雨降临，所有星团繁育!", "#88ddff", "bottom");
            updateUI(); renderClusterList(); clusters.forEach(c=>triggerGlow(c.position,0x88aaff));
        }
        function skillStasis() {
            if(globalStasisActive) { addEventLog("时空已经停滞", "#ffaa88", "bottom"); return; }
            if(starDustEnergy < 25) { addEventLog("星尘不足 (25)", "#ff9988", "bottom"); return; }
            starDustEnergy -= 25;
            globalStasisActive = true;
            stasisEndTime = Date.now() + 8000;
            addEventLog("⏳ 时空停滞，星落暂停互动 8秒", "#88ffcc", "bottom");
            updateUI();
            setTimeout(()=>{ globalStasisActive = false; addEventLog("时空恢复流动", "#88ffcc", "bottom"); updateUI(); }, 8000);
        }
        function skillMigrate() {
            const selected = getSelectedClusters();
            if(selected.length===0) { addEventLog("未选中星团，无法迁徙", "#ffaa88", "bottom"); return; }
            if(starDustEnergy < 15 * selected.length) { addEventLog("星尘不足", "#ff9988", "bottom"); return; }
            starDustEnergy -= 15 * selected.length;
            for(let c of selected) {
                let newX = (Math.random()-0.5)*12, newZ = (Math.random()-0.5)*10, newY = 0.2+Math.random()*1.2;
                c.position.set(newX, newY, newZ);
                c.labelObj.position.copy(c.position);
                c.interactMesh.position.copy(c.position);
                c.initParticles(); c.updateGeometry();
            }
            addEventLog(`🌀 迁徙 ${selected.length} 个星团`, "#aaffdd", "bottom");
            updateUI(); renderClusterList();
        }
        
        function triggerGlow(pos, colorHex) {
            const geom = new THREE.BufferGeometry();
            const verts = [];
            for(let i=0;i<40;i++) { const rad=0.7+Math.random()*1.1; const ang=Math.random()*Math.PI*2; const yoff=(Math.random()-0.5)*1.2; verts.push(pos.x+Math.cos(ang)*rad, pos.y+yoff, pos.z+Math.sin(ang)*rad); }
            geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts),3));
            const mat = new THREE.PointsMaterial({ color: colorHex, size: 0.12, blending: THREE.AdditiveBlending, transparent: true });
            const glow = new THREE.Points(geom, mat);
            scene.add(glow);
            setTimeout(()=>scene.remove(glow), 400);
        }
        
        // 星落自主战争/合作
        let pendingEncounter = null;
        function triggerEncounterWithPreview(a,b,isWar) {
            if(pendingEncounter) return;
            pendingEncounter = { a, b, isWar };
            const linePoints = [a.position.clone(), b.position.clone()];
            const lineGeo = new THREE.BufferGeometry().setFromPoints(linePoints);
            const lineMat = new THREE.LineBasicMaterial({ color: isWar ? 0xff4444 : 0x3399ff, transparent: true, opacity: 0.8 });
            const lineObj = new THREE.Line(lineGeo, lineMat);
            scene.add(lineObj);
            setTimeout(() => {
                scene.remove(lineObj);
                if(isWar) {
                    let lossA = Math.floor(Math.random()*12)+6, lossB = Math.floor(Math.random()*12)+6;
                    if(a.aggressiveness > b.aggressiveness) lossB += 2;
                    lossA = Math.min(a.population-MIN_POP, lossA); lossB = Math.min(b.population-MIN_POP, lossB);
                    if(lossA<0) lossA=0; if(lossB<0) lossB=0;
                    a.setPopulation(a.population - lossA); b.setPopulation(b.population - lossB);
                    starDustEnergy += Math.floor((lossA+lossB)*0.3);
                    addEventLog(`⚔️ 战争！ ${a.name} vs ${b.name} 损失 ${lossA}/${lossB}`, "#ff8888", "top");
                    triggerGlow(a.position, 0xff4444); triggerGlow(b.position, 0xff4444);
                } else {
                    let gainA = Math.floor(Math.random()*14)+6, gainB = Math.floor(Math.random()*14)+6;
                    if(a.aggressiveness < 0.4 && b.aggressiveness < 0.4) { gainA+=4; gainB+=4; }
                    a.addPopulation(gainA); b.addPopulation(gainB);
                    starDustEnergy += Math.floor((gainA+gainB)*0.4);
                    addEventLog(`🤝 合作！ ${a.name} & ${b.name} 各获 +${gainA}/${gainB}`, "#88ccff", "top");
                    triggerGlow(a.position, 0x3399ff); triggerGlow(b.position, 0x3399ff);
                }
                updateUI(); renderClusterList();
                pendingEncounter = null;
            }, 400);
        }
        
        function randomEncounter(now) {
            if(globalStasisActive || clusters.length<2 || pendingEncounter) return;
            let interval = 5000 + Math.random()*8000;
            if(now - lastEncounterTime > interval) {
                lastEncounterTime = now;
                let idxA = Math.floor(Math.random()*clusters.length);
                let idxB; do { idxB = Math.floor(Math.random()*clusters.length); } while(idxB===idxA);
                const a = clusters[idxA], b = clusters[idxB];
                const dist = a.position.distanceTo(b.position);
                if(dist > 4.5) return;
                const isWar = Math.random() < (a.aggressiveness + b.aggressiveness)/2;
                triggerEncounterWithPreview(a,b,isWar);
            }
        }
        
        // 拖拽移动
        let dragTarget = null, dragStartPos = null;
        function onDragStart(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((event.clientX - rect.left)/rect.width)*2-1;
            const y = -((event.clientY - rect.top)/rect.height)*2+1;
            raycaster.setFromCamera(new THREE.Vector2(x,y), camera);
            const intersects = raycaster.intersectObjects(clusters.map(c=>c.interactMesh));
            if(intersects.length) {
                const cluster = clusters.find(c=>c.interactMesh===intersects[0].object);
                if(cluster && (event.ctrlKey || selectedClusterIds.has(cluster.id))) {
                    dragTarget = getSelectedClusters();
                } else if(cluster) {
                    selectedClusterIds.clear(); selectedClusterIds.add(cluster.id);
                    dragTarget = [cluster];
                    highlightSelected(); renderClusterList();
                } else dragTarget = null;
                if(dragTarget) dragStartPos = { x:event.clientX, y:event.clientY };
                document.body.style.cursor = 'grabbing';
            }
        }
        function onDragMove(event) {
            if(!dragTarget || !dragStartPos) return;
            const dx = event.clientX - dragStartPos.x;
            const dy = event.clientY - dragStartPos.y;
            const moveScale = 0.008;
            for(let c of dragTarget) {
                c.position.x += dx * moveScale;
                c.position.y -= dy * moveScale * 0.8;
                c.position.z += dy * moveScale * 0.5;
                c.position.x = Math.min(8, Math.max(-8, c.position.x));
                c.position.y = Math.min(2.5, Math.max(-1, c.position.y));
                c.position.z = Math.min(7, Math.max(-7, c.position.z));
                c.labelObj.position.copy(c.position);
                c.interactMesh.position.copy(c.position);
                c.initParticles(); c.updateGeometry();
            }
            dragStartPos = { x:event.clientX, y:event.clientY };
            renderClusterList();
        }
        function onDragEnd() { dragTarget = null; dragStartPos = null; document.body.style.cursor = 'default'; }
        
        const raycasterClick = new THREE.Raycaster();
        const planeCreate = new THREE.Plane(new THREE.Vector3(0,1,0), 0.4);
        let longPressTimer = null;
        function onCanvasClick(event) {
            if(dragTarget) return;
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((event.clientX - rect.left)/rect.width)*2-1;
            const y = -((event.clientY - rect.top)/rect.height)*2+1;
            raycasterClick.setFromCamera(new THREE.Vector2(x,y), camera);
            const hitClusters = raycasterClick.intersectObjects(clusters.map(c=>c.interactMesh));
            if(hitClusters.length) {
                const cluster = clusters.find(c=>c.interactMesh===hitClusters[0].object);
                if(event.ctrlKey || event.metaKey) {
                    if(selectedClusterIds.has(cluster.id)) selectedClusterIds.delete(cluster.id);
                    else selectedClusterIds.add(cluster.id);
                } else { selectedClusterIds.clear(); selectedClusterIds.add(cluster.id); }
                highlightSelected(); renderClusterList(); return;
            }
            if(longPressTimer) clearTimeout(longPressTimer);
            longPressTimer = setTimeout(() => {
                const targetPoint = new THREE.Vector3();
                if(raycasterClick.ray.intersectPlane(planeCreate, targetPoint)) {
                    let finalPos = targetPoint.clone(); finalPos.y = 0.2+Math.random()*0.8;
                    finalPos.x = Math.min(7,Math.max(-7,finalPos.x)); finalPos.z = Math.min(6.5,Math.max(-6.5,finalPos.z));
                    createClusterAtPosition(finalPos);
                } else {
                    const dir = raycasterClick.ray.direction.clone().normalize();
                    createClusterAtPosition(camera.position.clone().add(dir.multiplyScalar(7)));
                }
                longPressTimer = null;
            }, 400);
        }
        function cancelLongPress() { if(longPressTimer) { clearTimeout(longPressTimer); longPressTimer=null; } }
        
        // 折叠控制
        function setupFoldable(panelId, headerId, iconId) {
            const panel = document.getElementById(panelId);
            const header = document.getElementById(headerId);
            const icon = document.getElementById(iconId);
            if(panel && header) header.addEventListener('click', () => {
                panel.classList.toggle('collapsed');
                if(icon) icon.textContent = panel.classList.contains('collapsed') ? '▲' : '▼';
            });
        }
        setupFoldable('clustersPanel', 'clustersHeader', 'clustersCollapseIcon');
        setupFoldable('godPanel', 'godHeader', 'godCollapseIcon');
        if(isMobile) {
            document.getElementById('clustersPanel')?.classList.add('collapsed');
            document.getElementById('clustersCollapseIcon').textContent = '▲';
            document.getElementById('godPanel')?.classList.add('collapsed');
            document.getElementById('godCollapseIcon').textContent = '▲';
        }
        
        // 按钮绑定
        document.getElementById('createBtn').addEventListener('click',()=>{ const fwd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); createClusterAtPosition(camera.position.clone().add(fwd.multiplyScalar(6.5))); });
        document.getElementById('breedBtn').addEventListener('click',actionBreed);
        document.getElementById('collapseBtn').addEventListener('click',actionCollapse);
        document.getElementById('deleteSelectedBtn').addEventListener('click',deleteSelected);
        document.getElementById('skillRain').addEventListener('click',skillRain);
        document.getElementById('skillStasis').addEventListener('click',skillStasis);
        document.getElementById('skillMigrate').addEventListener('click',skillMigrate);
        
        window.addEventListener('mousedown', onDragStart);
        window.addEventListener('mousemove', onDragMove);
        window.addEventListener('mouseup', onDragEnd);
        window.addEventListener('click', (e)=>{ if(!dragTarget) onCanvasClick(e); setTimeout(()=>cancelLongPress(),50); });
        window.addEventListener('touchstart', (e)=>{ if(e.touches.length) onDragStart(e.touches[0]); });
        window.addEventListener('touchmove', (e)=>{ if(e.touches.length) onDragMove(e.touches[0]); });
        window.addEventListener('touchend', onDragEnd);
        
        function initGame() {
            const positions = [new THREE.Vector3(-2.8,0.3,1.4), new THREE.Vector3(2.5,0.5,-1), new THREE.Vector3(0,-0.3,2.2), new THREE.Vector3(3.2,1.1,1.2), new THREE.Vector3(-2.2,1.2,-1.5)];
            positions.forEach((pos,idx) => {
                const hue = 0.25+idx*0.12;
                const colorHex = new THREE.Color().setHSL(hue,1,0.6).getStyle();
                const cluster = new StarCluster(clusters.length, genName(), pos, hue, 22+idx*9, colorHex, 0.3+Math.random()*0.6);
                clusters.push(cluster);
            });
            starDustEnergy = 130;
            updateUI(); renderClusterList(); if(clusters.length) { selectedClusterIds.add(clusters[0].id); highlightSelected(); }
            addEventLog("✨ 星云创世完成 · 顶部议会管理星团，底部圣坛释放神权 ✨", "#ffffff", "top");
        }
        
        let lastFrame = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(1/30, (now-lastFrame)/1000);
            lastFrame = now;
            controls.update();
            for(let c of clusters) c.update(delta);
            bgStars.rotation.y += 0.0002;
            randomEncounter(now);
            effectComposer.render();
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        initGame();
        animate();
        window.addEventListener('resize',()=>{ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); effectComposer.setSize(window.innerWidth,window.innerHeight); labelRenderer.setSize(window.innerWidth,window.innerHeight); });
        console.log('%c✨ 星云创造者·折叠编年史 | 双折叠面板 | 全功能 ✨','color:#0cf;font-size:14px;');
    </script>
</body>
</html>
