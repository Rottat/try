<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>星云粒子问答 · 流光幻境</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            touch-action: none;
            background-color: #020210;
        }
        /* 全息控制台面板 — 星云之眼 */
        .oracle-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 88%;
            max-width: 560px;
            background: rgba(5, 8, 25, 0.75);
            backdrop-filter: blur(18px);
            border-radius: 48px;
            border: 1px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 40px rgba(0, 200, 255, 0.3);
            padding: 18px 20px;
            z-index: 30;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            opacity: 0;
            visibility: hidden;
            font-family: 'Courier New', monospace;
            pointer-events: none;
        }
        .oracle-panel.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            bottom: 40px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px dashed rgba(0, 255, 200, 0.6);
            margin-bottom: 15px;
            padding-bottom: 8px;
            color: #0cf;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .theme-tag {
            font-size: 14px;
            background: rgba(0,255,200,0.2);
            padding: 4px 12px;
            border-radius: 30px;
        }
        .chat-area {
            max-height: 280px;
            overflow-y: auto;
            margin-bottom: 16px;
            padding-right: 6px;
            scrollbar-width: thin;
        }
        .chat-area::-webkit-scrollbar {
            width: 4px;
        }
        .chat-area p {
            margin: 10px 0;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
        }
        .user-msg {
            color: #bbb;
            border-left: 3px solid #0cf;
            padding-left: 12px;
        }
        .ai-msg {
            color: #ffcc88;
            text-shadow: 0 0 3px rgba(255,200,100,0.5);
            border-left: 3px solid #ffaa44;
            padding-left: 12px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 6px 12px;
            border: 1px solid rgba(0,255,200,0.4);
        }
        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            color: #0cf;
            font-family: monospace;
            font-size: 14px;
            outline: none;
            padding: 10px 5px;
        }
        .input-group input::placeholder {
            color: rgba(0,255,200,0.5);
        }
        .input-group button {
            background: rgba(0,255,200,0.2);
            border: none;
            border-radius: 40px;
            color: #0cf;
            padding: 6px 18px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-group button:active {
            transform: scale(0.96);
            background: rgba(0,255,200,0.6);
        }
        .back-star-btn {
            margin-top: 12px;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            background: rgba(0,0,0,0.4);
            border-radius: 30px;
            padding: 6px;
            transition: 0.2s;
        }
        .back-star-btn:active {
            background: rgba(0,255,200,0.2);
            color: #0cf;
        }
        .instruction-tip {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 10px;
            color: #ccc;
            pointer-events: none;
            z-index: 25;
            font-family: monospace;
        }
        @media (max-width: 600px) {
            .oracle-panel { width: 90%; padding: 14px; bottom: 20px; }
            .chat-area p { font-size: 12px; }
            .input-group button { padding: 4px 12px; }
        }
        .shockwave-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div class="instruction-tip">
        🌌 轻触星云文字 → 冲击波·粒子重构问答 | 滑动视角感受流光
    </div>
    <div id="oraclePanel" class="oracle-panel">
        <div class="panel-header">
            <span>✦ 星云智识核心 ✦</span>
            <span class="theme-tag" id="themeLabel">SCI-FI</span>
        </div>
        <div class="chat-area" id="chatMessages">
            <p class="ai-msg">✨ 粒子聚合完成，等待你的提问...</p>
        </div>
        <div class="input-group">
            <input type="text" id="questionInput" placeholder="向星云发问...">
            <button id="askBtn">⟳ 问询</button>
        </div>
        <div class="back-star-btn" id="resetNebulaBtn">↺ 重返粒子圣殿</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // ----- 初始化核心 -----
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020214);
        scene.fog = new THREE.FogExp2(0x020214, 0.008);
        
        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 0.5, 14);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: !isMobile });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);
        
        // 后期 bloom 增强星云感
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.4, 0.7);
        bloomPass.threshold = 0.1;
        bloomPass.strength = isMobile ? 0.7 : 0.95;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // 简单控制让视角可轻微拖拽 (移动端禁用轨道但支持触摸滑动视角？保留自动动效)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = !isMobile;
        controls.enablePan = false;
        controls.rotateSpeed = 0.8;
        controls.zoomSpeed = 0.8;
        controls.target.set(0, 0, 0);
        
        // ----- 辅助光源&背景星云粒子群 -----
        const ambient = new THREE.AmbientLight(0x111122);
        scene.add(ambient);
        const pointLight = new THREE.PointLight(0x77aaff, 0.8);
        pointLight.position.set(2, 3, 4);
        scene.add(pointLight);
        
        // 深邃背景星群
        const bgStarGeo = new THREE.BufferGeometry();
        const bgStarCount = isMobile ? 1200 : 2200;
        const bgPositions = new Float32Array(bgStarCount * 3);
        for (let i = 0; i < bgStarCount; i++) {
            bgPositions[i*3] = (Math.random() - 0.5) * 200;
            bgPositions[i*3+1] = (Math.random() - 0.5) * 100;
            bgPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        bgStarGeo.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
        const bgStarMat = new THREE.PointsMaterial({ color: 0xaaccff, size: isMobile ? 0.08 : 0.12, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
        const bgStars = new THREE.Points(bgStarGeo, bgStarMat);
        scene.add(bgStars);
        
        // 漂浮雾状粒子 (动态星尘)
        const dustCount = isMobile ? 800 : 1600;
        const dustGeo = new THREE.BufferGeometry();
        const dustPositions = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            dustPositions[i*3] = (Math.random() - 0.5) * 18;
            dustPositions[i*3+1] = (Math.random() - 0.5) * 12;
            dustPositions[i*3+2] = (Math.random() - 0.5) * 15 - 5;
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        const dustMat = new THREE.PointsMaterial({ color: 0x88bbff, size: 0.04, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending });
        const dustParticles = new THREE.Points(dustGeo, dustMat);
        scene.add(dustParticles);
        
        // ---------- 核心: 生成文字粒子 (通过Canvas像素采样) ----------
        function generateWordParticles(word, baseHue, colorVariety = 0.3, particleSize = 0.12, posOffset = { x: 0, y: 0, z: 0 }) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 256;
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = `Bold ${140}px "Segoe UI", "Poppins", "Courier New"`;
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(word, canvas.width/2, canvas.height/2);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const positions = [];
            const colors = [];
            const step = 3; // 采样步长，控制粒子密度
            for (let y = 0; y < canvas.height; y += step) {
                for (let x = 0; x < canvas.width; x += step) {
                    const idx = (y * canvas.width + x) * 4;
                    if (data[idx] > 200) {
                        // 将归一化坐标映射到 3D 范围: x: -2.5~2.5, y: -1.2~1.2
                        const px = (x / canvas.width) * 5.2 - 2.6;
                        const py = (1 - (y / canvas.height)) * 2.4 - 1.2;
                        const pz = 0;
                        // 添加微小z轴厚度
                        const offsetZ = (Math.random() - 0.5) * 0.2;
                        positions.push(px + posOffset.x, py + posOffset.y, pz + posOffset.z + offsetZ);
                        // 不同色彩: 基于文字主色 + 随机偏移
                        const hue = (baseHue + (Math.random() - 0.5) * colorVariety) % 1.0;
                        const color = new THREE.Color().setHSL(hue, 1.0, 0.65);
                        colors.push(color.r, color.g, color.b);
                    }
                }
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
            const material = new THREE.PointsMaterial({ size: particleSize, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true });
            const points = new THREE.Points(geometry, material);
            return { points, positions: positions.slice(), colors: colors.slice() };
        }
        
        // 定义三大星云文字
        const wordsConfig = [
            { name: 'SCI-FI', hue: 0.55, colorVar: 0.2, offset: { x: -3.4, y: 1.2, z: 0.2 }, size: 0.13 },
            { name: 'PHILOSOPHY', hue: 0.85, colorVar: 0.25, offset: { x: 0, y: -0.8, z: 0.5 }, size: 0.12 },
            { name: 'FUNNY', hue: 0.12, colorVar: 0.2, offset: { x: 3.2, y: 1.0, z: 0.1 }, size: 0.13 }
        ];
        
        const wordGroups = [];
        const allParticleObjects = [];  // 存储所有粒子系统以及单个粒子的初始位置&颜色，用于冲击波重构
        let activeWordIndex = null;
        let isShockwaveMode = false;    // 冲击波问答模式标志
        let shockwaveAnimProgress = 0;
        let shockwaveParticlesData = []; // 临时存储所有粒子当前/目标
        
        // 收集场景内所有粒子(文字粒子+装饰粒子, 文字粒子需要动态移动)
        let masterParticleList = []; // 每个元素: { ref, positions, colors, originalPos, currentVelocity }
        
        // 生成三个文字粒子并存储
        wordsConfig.forEach((cfg, idx) => {
            const { points, positions, colors } = generateWordParticles(cfg.name, cfg.hue, cfg.colorVar, cfg.size, cfg.offset);
            scene.add(points);
            wordGroups.push({ points, name: cfg.name, hue: cfg.hue, offset: cfg.offset, positionsRef: positions, colorsRef: colors });
            // 存储到主控列表
            masterParticleList.push({
                ref: points,
                initialPositions: positions.slice(),
                initialColors: colors.slice(),
                dynamicPositions: points.geometry.attributes.position.array,
                colorAttr: points.geometry.attributes.color.array,
                count: positions.length / 3
            });
        });
        
        // 添加额外的星云环粒子 (装饰性 且 参与冲击波)
        const ringParticleCount = isMobile ? 600 : 1000;
        const ringGeo = new THREE.BufferGeometry();
        const ringPos = [];
        const ringCols = [];
        for (let i = 0; i < ringParticleCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const rad = 2.4 + Math.random() * 1.8;
            const x = Math.cos(angle) * rad;
            const z = Math.sin(angle) * rad;
            const y = Math.sin(angle * 2) * 0.8;
            ringPos.push(x, y, z);
            const hueRing = 0.6 + Math.random() * 0.3;
            const col = new THREE.Color().setHSL(hueRing, 1.0, 0.6);
            ringCols.push(col.r, col.g, col.b);
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(ringPos), 3));
        ringGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(ringCols), 3));
        const ringPointsMat = new THREE.PointsMaterial({ size: 0.06, vertexColors: true, blending: THREE.AdditiveBlending });
        const ringParticlesObj = new THREE.Points(ringGeo, ringPointsMat);
        scene.add(ringParticlesObj);
        masterParticleList.push({
            ref: ringParticlesObj,
            initialPositions: ringPos.slice(),
            initialColors: ringCols.slice(),
            dynamicPositions: ringParticlesObj.geometry.attributes.position.array,
            colorAttr: ringParticlesObj.geometry.attributes.color.array,
            count: ringParticleCount
        });
        
        // 额外添加飘浮星尘到冲击波列表
        masterParticleList.push({
            ref: dustParticles,
            initialPositions: dustPositions.slice(),
            initialColors: null,
            dynamicPositions: dustParticles.geometry.attributes.position.array,
            colorAttr: null,
            count: dustCount
        });
        
        // 预存原始位置快照
        for (let p of masterParticleList) {
            p.savedOrigPos = p.initialPositions.slice();
        }
        
        // ----- 冲击波逻辑 & 粒子搅乱 + 重组问答面板 -----
        let shockwaveActive = false;
        let shockwaveTime = 0;
        let explosionCenters = [];
        
        function triggerShockwave(selectedWordName, wordIndex) {
            if (shockwaveActive) return;
            shockwaveActive = true;
            isShockwaveMode = true;
            shockwaveTime = 0;
            activeWordIndex = wordIndex;
            const centerPos = { x: wordsConfig[wordIndex].offset.x, y: wordsConfig[wordIndex].offset.y, z: wordsConfig[wordIndex].offset.z };
            explosionCenters = [centerPos, { x: 0, y: 0, z: 0 }]; // 双重风暴
            
            // 为所有粒子生成随机速度向量 (向外辐射)
            for (let p of masterParticleList) {
                const positions = p.dynamicPositions;
                const count = p.count;
                if (!p.velocities) p.velocities = new Array(count * 3).fill(0);
                for (let i = 0; i < count; i++) {
                    const ix = i * 3;
                    const px = positions[ix];
                    const py = positions[ix+1];
                    const pz = positions[ix+2];
                    // 指向爆炸中心反向 + 随机
                    let dx = px - centerPos.x;
                    let dy = py - centerPos.y;
                    let dz = pz - centerPos.z;
                    let len = Math.hypot(dx, dy, dz) + 0.2;
                    let force = 1.2 / (len * 0.5 + 0.3);
                    force = Math.min(force, 1.8);
                    p.velocities[ix] = (dx / len) * force * (0.8 + Math.random() * 0.8);
                    p.velocities[ix+1] = (dy / len) * force * (0.8 + Math.random() * 0.8);
                    p.velocities[ix+2] = (dz / len) * force * (0.8 + Math.random() * 0.8);
                    // 加随机涡旋
                    p.velocities[ix] += (Math.random() - 0.5) * 0.5;
                    p.velocities[ix+1] += (Math.random() - 0.5) * 0.5;
                    p.velocities[ix+2] += (Math.random() - 0.5) * 0.5;
                }
            }
            
            // 动画搅乱持续0.8秒后 重构问答模式
            setTimeout(() => {
                if (shockwaveActive) {
                    finishShockwaveAndOpenOracle(selectedWordName, wordIndex);
                }
            }, 750);
        }
        
        function finishShockwaveAndOpenOracle(wordName, wordIdx) {
            shockwaveActive = false;
            // 隐藏原有的文字粒子群（透明化或缩放，而不是删除）
            wordGroups.forEach((grp, idx) => {
                grp.points.visible = false;
            });
            // 让星尘环淡出
            ringParticlesObj.visible = false;
            // 重新整理粒子位置 -> 构建围绕控制台的星云涡流
            for (let p of masterParticleList) {
                const positions = p.dynamicPositions;
                const count = p.count;
                for (let i = 0; i < count; i++) {
                    const ix = i * 3;
                    // 将粒子重新排列成螺旋光环, 围绕中心(0,0,0) 半径变化
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 2.0 + Math.random() * 2.5;
                    const yOff = (Math.random() - 0.5) * 2.2;
                    positions[ix] = Math.cos(angle) * radius;
                    positions[ix+2] = Math.sin(angle) * radius;
                    positions[ix+1] = yOff + Math.sin(angle * 3) * 0.6;
                }
                p.ref.geometry.attributes.position.needsUpdate = true;
            }
            // 启用全息控制台
            const panel = document.getElementById('oraclePanel');
            const themeLabel = document.getElementById('themeLabel');
            themeLabel.innerText = wordName;
            panel.classList.add('active');
            // 清空聊天记录，添加主题欢迎语
            const chatDiv = document.getElementById('chatMessages');
            chatDiv.innerHTML = '';
            const themeAnswers = getThemeAnswers(wordName);
            const welcomeMsg = themeAnswers.greeting || `✦ 你唤醒了 ${wordName} 星云智核，粒子凝为箴言，提问即见回响 ✦`;
            addAIMessage(welcomeMsg);
            isShockwaveMode = true;
        }
        
        // 主题问答知识库
        function getThemeAnswers(theme) {
            const themesDB = {
                'SCI-FI': {
                    greeting: '⚡ 超光流接口已连接，未来预言池涌动... 请提出你的深空疑问。',
                    answers: [
                        "🛸 银河联邦预测：你在接下来72小时内会有灵感爆发。",
                        "🤖 仿生意识波：你的创造力等级突破 Omega-9。",
                        "🌌 量子纠缠回声：向宇宙许愿，结果将超出预期。",
                        "💫 时空管理局批复：你即将踏上一条奇妙的冒险旅程。"
                    ],
                    keywordMap: { "未来": "🔮 时间线歧点显示，三年内你将影响至少百人。", "科技": "💻 你的数字构建力正在进化，尝试构建 AI 伙伴。", "宇宙": "🌠 你是星辰大海的一部分，永远璀璨。" }
                },
                'PHILOSOPHY': {
                    greeting: '📜 星云哲思录敞开，智慧粒子盘旋... 你的追问将点亮思考深渊。',
                    answers: [
                        "🌿 庄子曰：真实与梦境之间，此时此地就是答案。",
                        "🧘 尼采低语：凡杀不死你的，终将化作星尘力量。",
                        "💎 柏拉图洞见：你所见的影子，即将被真相照亮。",
                        "🌀 老子云：道法自然，你此刻的疑问即是道。"
                    ],
                    keywordMap: { "意义": "意义是你亲手编织的星图。", "幸福": "幸福流淌在觉知的每一个刹那。", "死亡": "死亡让生命粒子闪耀得更加珍贵。" }
                },
                'FUNNY': {
                    greeting: '😂 无厘头星云正在发笑，粒子抖成段子... 快问快答，笑果拉满！',
                    answers: [
                        "🐣 为什么程序员爱星云？因为 cloud 是最浪漫的环境！",
                        "🍕 检测到你幽默等级 MAX，建议立刻分享快乐光环。",
                        "🤣 今日定律：越焦虑越应该吃披萨，芝士就是力量。",
                        "🎈 老板说再改一版？不，星云粒子说：关机睡觉。"
                    ],
                    keywordMap: { "工作": "💼 工作像星云，看着美，靠近全是代码。", "钱": "💰 钞票乃身外之物，但星云粒子不介意变钱。", "爱情": "💞 爱是两颗星的引力，无法计算。" }
                }
            };
            return themesDB[theme] || themesDB['SCI-FI'];
        }
        
        function getAnswerByTheme(theme, question) {
            const data = getThemeAnswers(theme);
            const lowerQ = question.toLowerCase();
            for (let [key, val] of Object.entries(data.keywordMap || {})) {
                if (lowerQ.includes(key)) return val;
            }
            const answersArr = data.answers;
            return answersArr[Math.floor(Math.random() * answersArr.length)];
        }
        
        function addUserMessage(msg) {
            const chatDiv = document.getElementById('chatMessages');
            const p = document.createElement('p');
            p.className = 'user-msg';
            p.innerHTML = `❯ 你：${msg}`;
            chatDiv.appendChild(p);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
        
        function addAIMessage(msg) {
            const chatDiv = document.getElementById('chatMessages');
            const p = document.createElement('p');
            p.className = 'ai-msg';
            p.innerHTML = `◉ 星云回响：${msg}`;
            chatDiv.appendChild(p);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            // 特效：粒子闪烁表示回答生成
        }
        
        // 恢复粒子圣殿 (重置所有粒子文字)
        function resetNebula() {
            if (!isShockwaveMode && !shockwaveActive) return;
            // 隐藏控制台
            document.getElementById('oraclePanel').classList.remove('active');
            // 让文字粒子重新可见
            wordGroups.forEach((grp, idx) => {
                grp.points.visible = true;
                // 重置位置到初始存储
                const origPos = masterParticleList[idx].initialPositions;
                const positionsAttr = grp.points.geometry.attributes.position.array;
                for (let i = 0; i < origPos.length / 3; i++) {
                    positionsAttr[i*3] = origPos[i*3];
                    positionsAttr[i*3+1] = origPos[i*3+1];
                    positionsAttr[i*3+2] = origPos[i*3+2];
                }
                grp.points.geometry.attributes.position.needsUpdate = true;
            });
            ringParticlesObj.visible = true;
            // 重置光环粒子到初始
            const ringOrig = masterParticleList[3].initialPositions;
            const ringPosAttr = ringParticlesObj.geometry.attributes.position.array;
            for (let i=0; i<ringOrig.length/3;i++) {
                ringPosAttr[i*3]=ringOrig[i*3];
                ringPosAttr[i*3+1]=ringOrig[i*3+1];
                ringPosAttr[i*3+2]=ringOrig[i*3+2];
            }
            ringParticlesObj.geometry.attributes.position.needsUpdate = true;
            // 重置星尘
            const dustOrig = masterParticleList[4].initialPositions;
            const dustAttr = dustParticles.geometry.attributes.position.array;
            for (let i=0; i<dustOrig.length/3;i++) {
                dustAttr[i*3]=dustOrig[i*3];
                dustAttr[i*3+1]=dustOrig[i*3+1];
                dustAttr[i*3+2]=dustOrig[i*3+2];
            }
            dustParticles.geometry.attributes.position.needsUpdate = true;
            isShockwaveMode = false;
            shockwaveActive = false;
        }
        
        // ----- 射线检测 点击星云文字 (不可见包围盒方案)-----
        const raycaster = new THREE.Raycaster();
        const clickBoxes = [];
        wordsConfig.forEach((cfg, idx) => {
            const boxGeo = new THREE.BoxGeometry(2.8, 1.5, 0.8);
            const boxMat = new THREE.MeshBasicMaterial({ visible: false, transparent: true });
            const mesh = new THREE.Mesh(boxGeo, boxMat);
            mesh.position.set(cfg.offset.x, cfg.offset.y, cfg.offset.z);
            scene.add(mesh);
            clickBoxes.push({ mesh, idx, name: cfg.name });
        });
        
        function onPointerDown(event) {
            if (shockwaveActive || isShockwaveMode) return;
            const mouse = new THREE.Vector2();
            const rect = renderer.domElement.getBoundingClientRect();
            const x = (event.clientX - rect.left) / rect.width * 2 - 1;
            const y = -(event.clientY - rect.top) / rect.height * 2 + 1;
            mouse.set(x, y);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickBoxes.map(b => b.mesh));
            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                const boxItem = clickBoxes.find(b => b.mesh === hitMesh);
                if (boxItem) {
                    triggerShockwave(boxItem.name, boxItem.idx);
                }
            }
        }
        
        window.addEventListener('click', onPointerDown);
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length) {
                const touch = e.touches[0];
                const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
                onPointerDown(fakeEvent);
            }
            e.preventDefault();
        }, { passive: false });
        
        // 提问交互
        document.getElementById('askBtn').addEventListener('click', () => {
            const input = document.getElementById('questionInput');
            const q = input.value.trim();
            if (!q || !isShockwaveMode) return;
            const themeName = document.getElementById('themeLabel').innerText;
            addUserMessage(q);
            const answer = getAnswerByTheme(themeName, q);
            addAIMessage(answer);
            input.value = '';
            // 粒子光晕闪烁效果: 临时加亮光环
            ringParticlesObj.material.color.setHex(0xffaa88);
            setTimeout(() => { if(ringParticlesObj.material) ringParticlesObj.material.color.setHex(0x88aaff); }, 200);
        });
        document.getElementById('questionInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') document.getElementById('askBtn').click(); });
        document.getElementById('resetNebulaBtn').addEventListener('click', resetNebula);
        
        // 飘逸动画 & 冲击波更新位置
        let animTime = 0;
        function updateParticles() {
            if (shockwaveActive) {
                for (let p of masterParticleList) {
                    if (!p.velocities) continue;
                    const positions = p.dynamicPositions;
                    const count = p.count;
                    for (let i = 0; i < count; i++) {
                        const ix = i * 3;
                        positions[ix] += p.velocities[ix] * 0.15;
                        positions[ix+1] += p.velocities[ix+1] * 0.15;
                        positions[ix+2] += p.velocities[ix+2] * 0.15;
                        // 阻尼
                        p.velocities[ix] *= 0.97;
                        p.velocities[ix+1] *= 0.97;
                        p.velocities[ix+2] *= 0.97;
                    }
                    p.ref.geometry.attributes.position.needsUpdate = true;
                }
            } else if (!isShockwaveMode) {
                // 优雅漂浮
                wordGroups.forEach((grp, idx) => {
                    grp.points.rotation.y = Math.sin(animTime * 0.5 + idx) * 0.05;
                    grp.points.rotation.x = Math.sin(animTime * 0.3) * 0.03;
                });
                ringParticlesObj.rotation.y += 0.003;
                dustParticles.rotation.x += 0.001;
                bgStars.rotation.y += 0.0003;
            } else {
                // 问答模式粒子环绕旋转
                ringParticlesObj.rotation.y += 0.01;
                ringParticlesObj.rotation.x = Math.sin(animTime) * 0.1;
            }
            animTime += 0.016;
        }
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // 更新轨道
            updateParticles();
            effectComposer.render();
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // 星云跳转主题：从index跳来时 在控制台显示，保持顺畅跳转逻辑，且返回index时增加特效
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('from') === 'nebula') {
            console.log('✨ 来自星云彼岸，粒子共鸣');
        }
        
        // 优雅的页面跳转辅助（在index点击跳转会带上星云动画）
        console.log('%c🌌 星云粒子圣殿 · 文字由星尘构成，轻触冲击波开启智识之眼', 'color: #0cf; font-size: 14px;');
    </script>
</body>
</html>
