<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>星云创造者 · 星落纷争</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            touch-action: pan-x pan-y;
            background-color: #020210;
        }
        /* 造物主控制台 - 简洁优雅 */
        .creator-panel {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 680px;
            background: rgba(6, 12, 32, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(0, 210, 255, 0.7);
            box-shadow: 0 0 40px rgba(0, 160, 255, 0.4);
            padding: 16px 20px;
            z-index: 40;
            font-family: monospace;
            color: #eef;
            transition: all 0.2s;
            pointer-events: auto;
        }
        .resource-bar {
            display: flex;
            justify-content: space-between;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0,200,255,0.4);
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: bold;
        }
        .resource {
            background: rgba(0,0,0,0.6);
            padding: 4px 14px;
            border-radius: 40px;
            letter-spacing: 1px;
        }
        .resource span {
            color: #ffdd88;
            font-size: 20px;
        }
        .cluster-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 11px;
            max-height: 70px;
            overflow-y: auto;
            padding: 4px 0;
        }
        .cluster-badge {
            background: rgba(20,30,55,0.8);
            border-radius: 30px;
            padding: 4px 12px;
            border-left: 3px solid;
            cursor: pointer;
            transition: 0.1s;
            white-space: nowrap;
        }
        .cluster-badge.selected {
            background: rgba(0,180,255,0.5);
            box-shadow: 0 0 8px #0cf;
            transform: scale(1.02);
        }
        .action-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 12px 0 8px;
        }
        .god-btn {
            background: rgba(20, 30, 55, 0.9);
            border: 1px solid rgba(0, 210, 255, 0.7);
            border-radius: 60px;
            padding: 8px 20px;
            font-family: monospace;
            font-weight: bold;
            font-size: 13px;
            color: #0cf;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        .god-btn:active {
            transform: scale(0.96);
            background: rgba(0, 200, 255, 0.5);
            color: white;
        }
        .event-log {
            font-size: 10px;
            margin-top: 10px;
            text-align: center;
            color: #ffd9a0;
            border-top: 1px dashed rgba(0,200,255,0.4);
            padding-top: 8px;
            max-height: 52px;
            overflow-y: auto;
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            padding: 5px 14px;
            font-size: 10px;
            color: #ccf;
            pointer-events: none;
            z-index: 45;
        }
        @media (max-width: 600px) {
            .creator-panel { width: 90%; padding: 12px; bottom: 15px; }
            .god-btn { padding: 6px 14px; font-size: 11px; }
            .resource-bar { font-size: 13px; }
            .cluster-badge { font-size: 10px; }
        }
        .tip-highlight {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 6px 18px;
            border-radius: 40px;
            color: #ffdd99;
            font-size: 12px;
            pointer-events: none;
            z-index: 50;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .tip-highlight.show { opacity: 1; }
        #transitionCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 60;
        }
    </style>
</head>
<body>
    <div class="instruction">✨ 造物主 · 点击星团选中 | 点击虚空创造新星团 | 星落间自主战争(红晕) / 合作(蓝晕) ✨</div>
    <div class="tip-highlight" id="godTip">✨ 星云神谕 ✨</div>
    <div class="creator-panel">
        <div class="resource-bar">
            <div class="resource">🌌 星尘能量: <span id="dustAmount">100</span></div>
            <div class="resource">✨ 星团总数: <span id="clusterCount">0</span></div>
        </div>
        <div class="cluster-stats" id="clusterListPanel"></div>
        <div class="action-grid">
            <button class="god-btn" id="createBtn">🌟 创造新星团</button>
            <button class="god-btn" id="breedBtn">🌱 繁育 (+)</button>
            <button class="god-btn" id="collapseBtn">🌀 坍缩 (-)</button>
        </div>
        <div class="event-log" id="eventLog">✨ 轻触虚空，以星尘之力创造星团 · 星落之间将会自主互动(战争/合作)</div>
    </div>

    <div id="canvasContainer"></div>
    <canvas id="transitionCanvas"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ---------- 初始化场景 ----------
        const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020115);
        scene.fog = new THREE.FogExp2(0x020115, 0.004);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 2.5, 16);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // 后期 bloom 星云感
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.35, 0.7);
        bloomPass.threshold = 0.08;
        bloomPass.strength = isMobile ? 0.8 : 1.0;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // 轨道控制（让造物主可以自由巡视）
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 0.8;
        controls.rotateSpeed = 0.7;
        controls.target.set(0, 0, 0);
        
        // ---------- 柔和背景粒子 (不干扰交互) ----------
        const starBgGeo = new THREE.BufferGeometry();
        const starCount = isMobile ? 1500 : 2500;
        const starPositions = [];
        for (let i = 0; i < starCount; i++) {
            starPositions.push((Math.random() - 0.5) * 260);
            starPositions.push((Math.random() - 0.5) * 140);
            starPositions.push((Math.random() - 0.5) * 110 - 50);
        }
        starBgGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPositions), 3));
        const starMat = new THREE.PointsMaterial({ color: 0xaaccff, size: isMobile ? 0.08 : 0.11, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const bgStars = new THREE.Points(starBgGeo, starMat);
        scene.add(bgStars);
        
        const mistCount = isMobile ? 800 : 1200;
        const mistGeo = new THREE.BufferGeometry();
        const mistPos = [];
        for (let i = 0; i < mistCount; i++) {
            mistPos.push((Math.random() - 0.5) * 18, (Math.random() - 0.5) * 12, (Math.random() - 0.5) * 20 - 8);
        }
        mistGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(mistPos), 3));
        const mistMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.04, transparent: true, opacity: 0.2, blending: THREE.AdditiveBlending });
        const starMist = new THREE.Points(mistGeo, mistMat);
        scene.add(starMist);
        
        const dustCount = 1000;
        const dustGeo = new THREE.BufferGeometry();
        const dustArray = [];
        for (let i = 0; i < dustCount; i++) {
            dustArray.push((Math.random() - 0.5) * 20, (Math.random() - 0.5) * 14, (Math.random() - 0.5) * 18 - 6);
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dustArray), 3));
        const dustMatLight = new THREE.PointsMaterial({ color: 0x99ccff, size: 0.035, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending });
        const dustCloud = new THREE.Points(dustGeo, dustMatLight);
        scene.add(dustCloud);
        
        // ---------- 星团类 (每个星团拥有独特颜色粒子) ----------
        let clusters = [];
        let selectedClusterId = null;
        let hoveredClusterId = null;     // 桌面端悬浮
        let starDustEnergy = 120;
        const MIN_POP = 6;
        const MAX_POP = 130;
        
        // UI 元素
        const dustAmountSpan = document.getElementById('dustAmount');
        const clusterCountSpan = document.getElementById('clusterCount');
        const clusterListPanel = document.getElementById('clusterListPanel');
        const eventLogDiv = document.getElementById('eventLog');
        
        function addEventLog(msg, color = "#ffd9a0") {
            const p = document.createElement('div');
            p.style.color = color;
            p.innerHTML = `✨ ${msg}`;
            eventLogDiv.appendChild(p);
            while(eventLogDiv.children.length > 6) eventLogDiv.removeChild(eventLogDiv.firstChild);
            eventLogDiv.scrollTop = eventLogDiv.scrollHeight;
            const tip = document.getElementById('godTip');
            tip.textContent = msg.length > 48 ? msg.slice(0,45)+"..." : msg;
            tip.classList.add('show');
            setTimeout(() => tip.classList.remove('show'), 1800);
        }
        
        function updateResourceUI() {
            dustAmountSpan.innerText = Math.floor(starDustEnergy);
            clusterCountSpan.innerText = clusters.length;
        }
        
        // ----- 标签透明度控制 (半透明 -> 高亮) -----
        function setLabelOpacity(cluster, opacity) {
            if (cluster && cluster.labelElement) {
                cluster.labelElement.style.opacity = opacity;
            }
        }
        
        function resetAllLabelsToDim() {
            clusters.forEach(c => {
                if (selectedClusterId !== c.id && hoveredClusterId !== c.id) {
                    setLabelOpacity(c, 0.5);
                } else if (selectedClusterId === c.id) {
                    setLabelOpacity(c, 1.0);   // 选中的始终保持完全不透明
                } else if (hoveredClusterId === c.id && !isMobile) {
                    setLabelOpacity(c, 1.0);
                }
            });
        }
        
        function highlightCluster(cluster, highlight = true) {
            if (!cluster) return;
            setLabelOpacity(cluster, highlight ? 1.0 : 0.5);
        }
        
        // 更新悬浮高亮 (仅桌面端)
        function updateHoverHighlight(hoverCluster) {
            if (isMobile) return;
            if (hoveredClusterId !== null) {
                const prev = clusters.find(c => c.id === hoveredClusterId);
                if (prev && prev.id !== selectedClusterId) setLabelOpacity(prev, 0.5);
            }
            hoveredClusterId = hoverCluster ? hoverCluster.id : null;
            if (hoverCluster && hoverCluster.id !== selectedClusterId) {
                setLabelOpacity(hoverCluster, 1.0);
            } else if (hoverCluster && hoverCluster.id === selectedClusterId) {
                // 选中且悬浮，已经是1.0
            }
            if (selectedClusterId !== null) {
                const selected = clusters.find(c => c.id === selectedClusterId);
                if (selected) setLabelOpacity(selected, 1.0);
            }
        }
        
        // ----- 粒子星团类 (不同色相粒子)-----
        class StarCluster {
            constructor(id, name, pos, baseHue, initialPop, colorHex) {
                this.id = id;
                this.name = name;
                this.position = pos.clone();
                this.baseHue = baseHue;
                this.population = Math.min(MAX_POP, Math.max(MIN_POP, initialPop));
                this.colorHex = colorHex;
                this.particles = [];
                this.pointsObj = null;
                this.labelObj = null;
                this.labelElement = null;
                this.interactMesh = null;
                this.initParticles();
                this.createLabel();
                this.createInteractSphere();
                this.updateGeometry();
            }
            
            initParticles() {
                const targetCount = this.getParticleCount();
                this.particles = [];
                for (let i = 0; i < targetCount; i++) {
                    const rad = 0.5 + Math.random() * 1.3;
                    const ang1 = Math.random() * Math.PI * 2;
                    const ang2 = Math.acos(2 * Math.random() - 1);
                    let x = this.position.x + rad * Math.sin(ang2) * Math.cos(ang1);
                    let y = this.position.y + rad * Math.sin(ang2) * Math.sin(ang1) * 0.7;
                    let z = this.position.z + rad * Math.cos(ang2) * 0.9;
                    const vel = new THREE.Vector3(
                        (Math.random() - 0.5) * 0.09,
                        (Math.random() - 0.5) * 0.09,
                        (Math.random() - 0.5) * 0.09
                    );
                    const sat = 0.85 + Math.random() * 0.15;
                    const light = 0.6 + Math.random() * 0.3;
                    // 粒子颜色基于星团基础色相，形成同色系但丰富变化
                    const col = new THREE.Color().setHSL(this.baseHue + (Math.random() - 0.5)*0.18, sat, light);
                    this.particles.push({
                        pos: new THREE.Vector3(x, y, z),
                        vel: vel,
                        color: col
                    });
                }
            }
            
            getParticleCount() {
                return Math.floor(22 + (this.population / MAX_POP) * 170);
            }
            
            updateParticlesMotion(deltaTime) {
                for (let p of this.particles) {
                    const toCenter = new THREE.Vector3().subVectors(this.position, p.pos);
                    const force = toCenter.multiplyScalar(0.007);
                    p.vel.x += (Math.random() - 0.5) * 0.035 + force.x;
                    p.vel.y += (Math.random() - 0.5) * 0.035 + force.y;
                    p.vel.z += (Math.random() - 0.5) * 0.035 + force.z;
                    p.vel.clampLength(0, 0.11);
                    p.pos.x += p.vel.x * deltaTime * 18;
                    p.pos.y += p.vel.y * deltaTime * 18;
                    p.pos.z += p.vel.z * deltaTime * 18;
                    let offset = p.pos.clone().sub(this.position);
                    let len = offset.length();
                    if(len > 1.8) {
                        offset.multiplyScalar(1.8 / len);
                        p.pos.copy(this.position.clone().add(offset));
                    }
                }
                let target = this.getParticleCount();
                if(Math.abs(this.particles.length - target) > 12) {
                    this.rebuildParticles();
                }
            }
            
            rebuildParticles() {
                this.initParticles();
                this.updateGeometry();
            }
            
            updateGeometry() {
                const positions = [];
                const colors = [];
                for (let p of this.particles) {
                    positions.push(p.pos.x, p.pos.y, p.pos.z);
                    colors.push(p.color.r, p.color.g, p.color.b);
                }
                const geom = new THREE.BufferGeometry();
                geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
                geom.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
                if (this.pointsObj) scene.remove(this.pointsObj);
                const material = new THREE.PointsMaterial({ size: 0.075, vertexColors: true, blending: THREE.AdditiveBlending });
                this.pointsObj = new THREE.Points(geom, material);
                scene.add(this.pointsObj);
            }
            
            createLabel() {
                const div = document.createElement('div');
                div.style.cssText = `
                    background: rgba(0,0,0,0.7);
                    backdrop-filter: blur(6px);
                    padding: 3px 10px;
                    border-radius: 30px;
                    border-left: 3px solid ${this.colorHex};
                    color: ${this.colorHex};
                    font-family: monospace;
                    font-weight: bold;
                    font-size: ${isMobile ? '10px' : '12px'};
                    white-space: nowrap;
                    pointer-events: none;
                    text-shadow: 0 0 3px ${this.colorHex};
                    opacity: 0.5;
                    transition: opacity 0.2s ease;
                `;
                div.innerHTML = `<span>🌟 ${this.name}</span><br><span>🧬 ${this.population}</span>`;
                this.labelObj = new CSS2DObject(div);
                this.labelElement = div;
                this.labelObj.position.copy(this.position);
                scene.add(this.labelObj);
            }
            
            createInteractSphere() {
                const geom = new THREE.SphereGeometry(1.25, 12, 12);
                const mat = new THREE.MeshBasicMaterial({ visible: false });
                this.interactMesh = new THREE.Mesh(geom, mat);
                this.interactMesh.position.copy(this.position);
                this.interactMesh.userData = { clusterId: this.id, type: 'cluster' };
                scene.add(this.interactMesh);
            }
            
            updateLabel() {
                if(this.labelElement) {
                    this.labelElement.innerHTML = `<span>🌟 ${this.name}</span><br><span>🧬 ${this.population}</span>`;
                }
            }
            
            setPopulation(newPop, source = "system") {
                let old = this.population;
                this.population = Math.min(MAX_POP, Math.max(MIN_POP, newPop));
                if(old !== this.population) {
                    this.updateLabel();
                    this.rebuildParticles();
                }
            }
            
            addPopulation(delta) { this.setPopulation(this.population + delta); }
            
            update(deltaTime) {
                this.updateParticlesMotion(deltaTime);
                this.updateGeometry();
            }
            
            destroy() {
                if(this.pointsObj) scene.remove(this.pointsObj);
                if(this.labelObj) scene.remove(this.labelObj);
                if(this.interactMesh) scene.remove(this.interactMesh);
            }
        }
        
        // 星团名称生成器
        const namePrefix = ["星尘", "幻光", "暗语", "绯炎", "霜月", "星环", "曦和", "幽荧", "荧惑", "天枢"];
        const nameSuffix = ["之种", "星落", "云巢", "圣殿", "渊薮", "花园", "回廊", "方舟", "摇篮", "歌剧院"];
        function genClusterName() {
            return namePrefix[Math.floor(Math.random() * namePrefix.length)] + nameSuffix[Math.floor(Math.random() * nameSuffix.length)];
        }
        
        function createClusterAtPosition(pos3D) {
            if(starDustEnergy < 18) {
                addEventLog("星尘不足，无法创造新星团 (需要18)", "#ff9988");
                return false;
            }
            const hue = 0.1 + Math.random() * 0.7;
            const colorHex = new THREE.Color().setHSL(hue, 1.0, 0.6).getStyle();
            const newId = clusters.length;
            const newName = genClusterName();
            const initPop = 16 + Math.floor(Math.random() * 22);
            const newCluster = new StarCluster(newId, newName, pos3D, hue, initPop, colorHex);
            clusters.push(newCluster);
            starDustEnergy -= 18;
            updateResourceUI();
            addEventLog(`🌟 造物主创造了星团「${newName}」，初始生灵 ${initPop}`, "#aaffdd");
            renderClusterList();
            return true;
        }
        
        function deleteCluster(cluster) {
            const idx = clusters.findIndex(c => c.id === cluster.id);
            if(idx !== -1) {
                cluster.destroy();
                clusters.splice(idx, 1);
                if(selectedClusterId === cluster.id) selectedClusterId = null;
                if(hoveredClusterId === cluster.id) hoveredClusterId = null;
                renderClusterList();
                updateResourceUI();
            }
        }
        
        function renderClusterList() {
            clusterListPanel.innerHTML = '';
            clusters.forEach(c => {
                const badge = document.createElement('div');
                badge.className = 'cluster-badge';
                if(selectedClusterId === c.id) badge.classList.add('selected');
                badge.style.borderLeftColor = c.colorHex;
                badge.innerHTML = `${c.name} 🧬${c.population}`;
                badge.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectedClusterId = c.id;
                    // 选中后，该标签变为完全不透明，且清除之前的悬浮高亮（选中的优先级最高）
                    clusters.forEach(cl => setLabelOpacity(cl, cl.id === selectedClusterId ? 1.0 : 0.5));
                    renderClusterList();
                    addEventLog(`选中星团 「${c.name}」`, "#aaccff");
                });
                clusterListPanel.appendChild(badge);
            });
        }
        
        function getSelectedCluster() {
            if(selectedClusterId === null) return null;
            return clusters.find(c => c.id === selectedClusterId);
        }
        
        // 玩家主动操作：繁育 / 坍缩
        function actionBreed() {
            const cluster = getSelectedCluster();
            if(!cluster) { addEventLog("请先点击星团选中一个星团", "#ffaa88"); return; }
            let cost = 12;
            if(starDustEnergy < cost) { addEventLog("星尘不足，无法进行繁育仪式", "#ff9988"); return; }
            let gain = Math.floor(Math.random() * 14) + 8;
            let newPop = cluster.population + gain;
            if(newPop > MAX_POP) newPop = MAX_POP;
            cluster.setPopulation(newPop);
            starDustEnergy -= cost;
            addEventLog(`🌱 星团「${cluster.name}」繁育 +${gain}，现余 ${cluster.population}`, "#88ffaa");
            updateResourceUI();
            renderClusterList();
            triggerGlowEffect(cluster.position, 0x88ffaa);
        }
        
        function actionCollapse() {
            const cluster = getSelectedCluster();
            if(!cluster) { addEventLog("请先选中一个星团", "#ffaa88"); return; }
            let loss = Math.floor(Math.random() * 12) + 5;
            let newPop = cluster.population - loss;
            if(newPop < MIN_POP) newPop = MIN_POP;
            let gainedDust = Math.floor(loss * 0.8);
            cluster.setPopulation(newPop);
            starDustEnergy += gainedDust;
            addEventLog(`🌀 星团「${cluster.name}」坍缩 -${loss}，释放 ${gainedDust} 星尘，现余 ${cluster.population}`, "#ffaa88");
            updateResourceUI();
            renderClusterList();
            triggerGlowEffect(cluster.position, 0xff8866);
            if(cluster.population <= MIN_POP) {
                addEventLog(`⚠️ 星团「${cluster.name}」濒临消亡，快用繁育拯救`, "#ff8866");
            }
        }
        
        // ========== 核心：星团自主战争/合作 (随机产生，光晕颜色区分) ==========
        let lastEncounterTime = performance.now();
        
        function randomEncounter(now) {
            if(clusters.length < 2) return;
            let intervalVariation = 5000 + Math.random() * 8000;
            if(now - lastEncounterTime > intervalVariation) {
                lastEncounterTime = now;
                let idxA = Math.floor(Math.random() * clusters.length);
                let idxB;
                do { idxB = Math.floor(Math.random() * clusters.length); } while(idxB === idxA && clusters.length > 1);
                const clusterA = clusters[idxA];
                const clusterB = clusters[idxB];
                const isWar = Math.random() < 0.5;
                if(isWar) {
                    // 战争：红色光晕
                    let lossA = Math.floor(Math.random() * 12) + 6;
                    let lossB = Math.floor(Math.random() * 12) + 6;
                    if(clusterA.population > clusterB.population) lossA = Math.max(3, lossA - 4);
                    else if(clusterB.population > clusterA.population) lossB = Math.max(3, lossB - 4);
                    lossA = Math.min(clusterA.population - MIN_POP, lossA);
                    lossB = Math.min(clusterB.population - MIN_POP, lossB);
                    if(lossA < 0) lossA = 0;
                    if(lossB < 0) lossB = 0;
                    clusterA.setPopulation(clusterA.population - lossA);
                    clusterB.setPopulation(clusterB.population - lossB);
                    starDustEnergy += Math.floor((lossA + lossB) * 0.3);
                    addEventLog(`⚔️ 星落战争！ ${clusterA.name} 与 ${clusterB.name} 激烈冲突，各自损失 ${lossA} / ${lossB} → ${clusterA.population} | ${clusterB.population}`, "#ffaa88");
                    // 红色光晕
                    triggerGlowEffect(clusterA.position, 0xff4444);
                    triggerGlowEffect(clusterB.position, 0xff4444);
                } else {
                    // 合作：蓝色光晕
                    let gainA = Math.floor(Math.random() * 14) + 6;
                    let gainB = Math.floor(Math.random() * 14) + 6;
                    clusterA.addPopulation(gainA);
                    clusterB.addPopulation(gainB);
                    let dustGain = Math.floor((gainA + gainB) * 0.5);
                    starDustEnergy += dustGain;
                    addEventLog(`🤝 星落共融！ ${clusterA.name} 与 ${clusterB.name} 缔结盟约，各获 +${gainA} / +${gainB}，星尘 +${dustGain} → ${clusterA.population} | ${clusterB.population}`, "#aaffdd");
                    // 蓝色光晕
                    triggerGlowEffect(clusterA.position, 0x3399ff);
                    triggerGlowEffect(clusterB.position, 0x3399ff);
                }
                updateResourceUI();
                renderClusterList();
                if(clusterA.population <= MIN_POP) addEventLog(`⚠️ 星团「${clusterA.name}」濒临湮灭`, "#ff8866");
                if(clusterB.population <= MIN_POP) addEventLog(`⚠️ 星团「${clusterB.name}」濒临湮灭`, "#ff8866");
            }
        }
        
        // 光晕效果 (红/蓝/其他)
        function triggerGlowEffect(pos, colorHex) {
            const geom = new THREE.BufferGeometry();
            const verts = [];
            for(let i=0;i<45;i++) {
                const rad = 0.7 + Math.random()*1.1;
                const ang = Math.random()*Math.PI*2;
                const yoff = (Math.random()-0.5)*1.2;
                verts.push(pos.x + Math.cos(ang)*rad, pos.y + yoff, pos.z + Math.sin(ang)*rad);
            }
            geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts),3));
            const colorObj = typeof colorHex === 'number' ? colorHex : parseInt(colorHex.slice(1), 16);
            const mat = new THREE.PointsMaterial({ color: colorHex, size: 0.12, blending: THREE.AdditiveBlending, transparent: true });
            const glow = new THREE.Points(geom, mat);
            scene.add(glow);
            setTimeout(() => scene.remove(glow), 450);
        }
        
        // ---------- 射线交互: 点击虚空创建星团 / 点选星团 / 桌面端悬浮高亮标签 ----------
        const raycaster = new THREE.Raycaster();
        const planeForCreation = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0.4);
        
        function onCanvasClick(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
            const clickableMeshes = clusters.map(c => c.interactMesh);
            const intersects = raycaster.intersectObjects(clickableMeshes);
            if(intersects.length > 0) {
                const hit = intersects[0].object;
                const clusterId = hit.userData.clusterId;
                if(clusterId !== undefined) {
                    selectedClusterId = clusterId;
                    // 高亮选中的标签，其他恢复半透明
                    clusters.forEach(c => setLabelOpacity(c, c.id === selectedClusterId ? 1.0 : 0.5));
                    renderClusterList();
                    const cluster = clusters.find(c => c.id === clusterId);
                    if(cluster) addEventLog(`✨ 选中星团 「${cluster.name}」`, "#aaccff");
                }
                return;
            }
            // 点击虚空：创建新星团
            const targetPoint = new THREE.Vector3();
            if(raycaster.ray.intersectPlane(planeForCreation, targetPoint)) {
                let finalPos = targetPoint.clone();
                finalPos.y = 0.2 + Math.random() * 0.8;
                finalPos.x = Math.min(7, Math.max(-7, finalPos.x));
                finalPos.z = Math.min(6.5, Math.max(-6.5, finalPos.z));
                createClusterAtPosition(finalPos);
            } else {
                const dir = raycaster.ray.direction.clone().normalize();
                const fallbackPos = camera.position.clone().add(dir.multiplyScalar(7));
                fallbackPos.y = 0.5;
                createClusterAtPosition(fallbackPos);
            }
        }
        
        // 桌面端悬浮检测 (仅当非移动端)
        function setupHoverDetection() {
            if (isMobile) return;
            window.addEventListener('mousemove', (event) => {
                const rect = renderer.domElement.getBoundingClientRect();
                const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
                const meshes = clusters.map(c => c.interactMesh);
                const intersects = raycaster.intersectObjects(meshes);
                let hoverCluster = null;
                if(intersects.length > 0) {
                    const clusterId = intersects[0].object.userData.clusterId;
                    hoverCluster = clusters.find(c => c.id === clusterId);
                }
                updateHoverHighlight(hoverCluster);
            });
        }
        
        // 初始化默认星团 (不同颜色粒子)
        function initGame() {
            const defaultPositions = [
                new THREE.Vector3(-2.8, 0.3, 1.4), new THREE.Vector3(2.5, 0.5, -1.0),
                new THREE.Vector3(0, -0.3, 2.2), new THREE.Vector3(3.2, 1.1, 1.2), new THREE.Vector3(-2.2, 1.2, -1.5)
            ];
            defaultPositions.forEach((pos, idx) => {
                const hue = 0.25 + idx * 0.12;  // 不同星团不同色相
                const colorHex = new THREE.Color().setHSL(hue, 1.0, 0.6).getStyle();
                const newCluster = new StarCluster(clusters.length, genClusterName(), pos, hue, 22 + idx * 9, colorHex);
                clusters.push(newCluster);
            });
            starDustEnergy = 110;
            updateResourceUI();
            renderClusterList();
            if(clusters.length > 0) selectedClusterId = clusters[0].id;
            // 初始让选中的标签完全可见
            clusters.forEach(c => setLabelOpacity(c, c.id === selectedClusterId ? 1.0 : 0.5));
            renderClusterList();
            addEventLog("✨ 星云世界已苏醒 · 星落间自主战争(红晕) / 合作(蓝晕) · 造物主请指引", "#ffffff");
        }
        
        // UI按钮绑定
        document.getElementById('createBtn').addEventListener('click', () => {
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const pos = camera.position.clone().add(forward.multiplyScalar(6.5));
            pos.y = 0.5;
            createClusterAtPosition(pos);
        });
        document.getElementById('breedBtn').addEventListener('click', actionBreed);
        document.getElementById('collapseBtn').addEventListener('click', actionCollapse);
        
        window.addEventListener('click', onCanvasClick);
        window.addEventListener('touchstart', (e) => {
            if(e.touches.length) {
                const touch = e.touches[0];
                const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
                onCanvasClick(fakeEvent);
            }
            if(e.target.closest && !e.target.closest('.creator-panel')) e.preventDefault();
        }, { passive: false });
        
        setupHoverDetection();
        
        // 动画循环
        let lastFrameTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(1/30, (now - lastFrameTime) / 1000);
            lastFrameTime = now;
            controls.update();
            for(let cluster of clusters) {
                cluster.update(delta);
            }
            bgStars.rotation.y += 0.0003;
            starMist.rotation.x += 0.0002;
            dustCloud.rotation.y += 0.0004;
            randomEncounter(now);
            effectComposer.render();
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        initGame();
        lastFrameTime = performance.now();
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('%c✨ 星云创造者 | 粒子星团·光晕战争(红)/合作(蓝) | 标签悬浮/点击高亮 ✨', 'color:#0cf; font-size:14px;');
    </script>
</body>
</html>
